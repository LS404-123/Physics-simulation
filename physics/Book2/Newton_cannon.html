<!DOCTYPE html>
<html lang="zh-HK">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>牛頓大炮 - 圓周運動模擬</title>
    <!-- MathJax -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');

        :root {
            --bg-color: #0f172a;
            /* 深藍偏黑 */
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);

            --neon-blue: #0ea5e9;
            --neon-red: #ef4444;
            --neon-green: #22c55e;
            --neon-yellow: #facc15;

            --gap: 20px;
            --radius: 20px;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-color);
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #020617 100%);
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            /* iPad Air 鎖定滾動 */
        }

        #app {
            width: 1100px;
            height: 650px;
            display: grid;
            grid-template-columns: 2.5fr 1fr;
            /* 讓繪圖區大一點 */
            grid-template-rows: 1fr;
            gap: var(--gap);
        }

        .bento {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            box-shadow: var(--glass-shadow);
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        /* 繪圖區 */
        #sim-container {
            grid-column: 1 / 2;
            grid-row: 1 / 2;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
        }

        canvas {
            border-radius: var(--radius);
            /* cursor: crosshair; */
            width: 100%;
            height: 100%;
        }

        /* 控制區 */
        #controls {
            grid-column: 2 / 3;
            grid-row: 1 / 2;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        h2 {
            margin: 0 0 12px 0;
            font-weight: 600;
            color: #f1f5f9;
        }

        /* UI 元件 */
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 14px;
            color: #cbd5e1;
            display: flex;
            justify-content: space-between;
        }

        .val-highlight {
            color: var(--neon-yellow);
            font-family: monospace;
            font-weight: bold;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
            accent-color: var(--neon-blue);
        }

        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        button {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        button:active {
            transform: scale(0.97);
        }

        .btn-fire {
            background: rgba(14, 165, 233, 0.2);
            border-color: rgba(14, 165, 233, 0.5);
            color: var(--neon-blue);
        }

        .btn-fire:hover {
            background: rgba(14, 165, 233, 0.3);
        }

        /* 儀表板 */
        .hud {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 12px;
            font-family: monospace;
            font-size: 13px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            color: #94a3b8;
        }

        .hud .row {
            display: flex;
            justify-content: space-between;
        }

        .hud .value {
            color: #fff;
        }

        #status {
            font-weight: bold;
        }

        /* 捲動條 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <div id="app">
        <!-- 繪圖區 -->
        <div class="bento" id="sim-container" style="position: relative;">
            <div style="position: absolute; top: 30px; left: 30px; z-index: 10; pointer-events: none;">
                <h1
                    style="margin: 0; font-size: 28px; font-weight: 600; color: #f8fafc; letter-spacing: 1px; text-shadow: 0 0 16px rgba(14,165,233,0.8);">
                    牛頓大炮</h1>
                <p
                    style="margin: 8px 0 0 0; font-size: 14px; color: #94a3b8; font-weight: 400; font-family: monospace;">
                    從拋體墜落到完美圓軌道的邊界</p>
            </div>
            <!-- Canvas 解析度設為容器兩倍抗鋸齒 -->
            <canvas id="sim-canvas" width="1400" height="1300"></canvas>
        </div>

        <!-- 控制區 -->
        <div class="bento" id="controls">
            <h2>發射控制</h2>

            <div class="control-group">
                <label>
                    <span>拋射初速率 \( v_0 \)</span>
                    <span class="val-highlight"><span id="v0-display">7.20</span> km/s</span>
                </label>
                <input type="range" id="v0-slider" min="4.0" max="12.0" step="0.05" value="7.2">
            </div>

            <div class="control-group" style="margin-top: 8px;">
                <label>
                    <span>發射高度 \( h \)</span>
                    <span class="val-highlight"><span id="h-display">1000</span> km</span>
                </label>
                <input type="range" id="h-slider" min="0" max="4000" step="100" value="1000">
            </div>

            <div class="btn-row" style="margin-top: 4px; margin-bottom: 4px;">
                <button id="btn-calc"
                    style="background: rgba(34, 197, 94, 0.2); border-color: rgba(34, 197, 94, 0.5); color: #22c55e;">計算最佳速率
                    (圓軌道)</button>
            </div>
            <div class="btn-row" style="margin-top: 0;">
                <button class="btn-fire" id="btn-fire">發射物體</button>
                <button id="btn-reset">重置軌跡</button>
            </div>

            <div class="hud">
                <div class="row"><span>系統狀態</span><span id="status" style="color: var(--neon-blue);">待命</span></div>
                <div class="row"><span>實時高度 \( r - R_E \)</span><span class="value"><span id="live-h">1000.0</span>
                        km</span></div>
                <div class="row"><span>瞬時速率 \( v \)</span><span class="value"><span id="live-v">0.00</span> km/s</span>
                </div>
                <div class="row"><span>向心力/重力加速度 \( a \)</span><span class="value"><span id="live-a">0.00</span>
                        m/s²</span></div>
            </div>
        </div>

    </div>

    <script>
        const canvas = document.getElementById('sim-canvas');
        const ctx = canvas.getContext('2d');

        // UI Elements
        const v0Slider = document.getElementById('v0-slider');
        const v0Display = document.getElementById('v0-display');
        const hSlider = document.getElementById('h-slider');
        const hDisplay = document.getElementById('h-display');

        const btnCalc = document.getElementById('btn-calc');
        const btnFire = document.getElementById('btn-fire');
        const btnReset = document.getElementById('btn-reset');

        const statusText = document.getElementById('status-text');
        const liveH = document.getElementById('live-h');
        const liveV = document.getElementById('live-v');
        const liveA = document.getElementById('live-a');
        const hudStatus = document.getElementById('status');

        // 物理常數
        const R_E = 6371; // 地球半徑 (km)
        const GM = 398600; // GM (km^3 / s^2)

        // 繪圖縮放及攝影機參數
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;

        let h0 = parseFloat(hSlider.value);
        let v0 = parseFloat(v0Slider.value);

        // 攝影機狀態
        let camX = 0;
        let camY = -(R_E + h0) * 0.95;
        let camScale = (canvas.height / 2) / 3500;

        let isRunning = false;
        let trails = [];

        let ball = {
            active: false,
            x: 0,
            y: 0,
            vx: 0,
            vy: 0,
            path: []
        };

        // 事件綁定
        v0Slider.addEventListener('input', (e) => {
            v0 = parseFloat(e.target.value);
            v0Display.textContent = v0.toFixed(2);
        });

        hSlider.addEventListener('input', (e) => {
            h0 = parseFloat(e.target.value);
            hDisplay.textContent = h0.toFixed(0);

            if (!ball.active) {
                const r0 = R_E + h0;
                liveH.textContent = h0.toFixed(1);
                liveV.textContent = "0.00";
                liveA.textContent = (GM / (r0 * r0) * 1000).toFixed(2); // 自動轉成 m/s^2 方便看
            }
        });

        btnCalc.addEventListener('click', () => {
            const r0 = R_E + h0;
            const targetV = Math.sqrt(GM / r0);
            v0 = targetV;
            v0Slider.value = targetV;
            v0Display.textContent = targetV.toFixed(2);
        });

        btnFire.addEventListener('click', () => {
            if (ball.path.length > 0) {
                trails.push([...ball.path]);
                if (trails.length > 3) trails.shift(); // 最多留三條
            }

            const r0 = R_E + h0;
            ball = {
                active: true,
                x: 0,
                y: -r0, // 定義 y 軸向下為正，上方為負
                vx: v0,
                vy: 0,
                path: []
            };

            isRunning = true;
            hudStatus.textContent = "飛行中";
            hudStatus.style.color = "#22c55e"; // neon green
        });

        btnReset.addEventListener('click', () => {
            isRunning = false;
            ball.active = false;
            ball.path = [];
            trails = [];

            hudStatus.textContent = "待命";
            hudStatus.style.color = "#0ea5e9";
            liveH.textContent = h0.toFixed(1);
            liveV.textContent = "0.00";
            liveA.textContent = (GM / ((R_E + h0) ** 2) * 1000).toFixed(2); // m/s^2
        });

        // ---- 繪圖運鏡核心 ---- 

        function updateCamera() {
            let targetX, targetY, targetScale;

            if (ball.active) {
                // 發射後：動態拉遠，並跟隨物體，讓重點部分在畫面中
                const r = Math.sqrt(ball.x * ball.x + ball.y * ball.y);
                const maxR = Math.max(R_E * 1.5, r * 1.5);
                targetScale = (Math.min(canvas.width, canvas.height) / 2) / maxR;

                targetX = ball.x * 0.4;
                targetY = ball.y * 0.4;
            } else {
                // 待命：拉近並觀察發射區
                targetX = 0;
                targetY = -(R_E + h0) * 0.95;

                const visibleHeight = 3500;
                targetScale = (canvas.height / 2) / visibleHeight;
            }

            // 平滑內插 (Lerp) 讓攝影機移動順暢
            camX += (targetX - camX) * 0.04;
            camY += (targetY - camY) * 0.04;
            camScale += (targetScale - camScale) * 0.04;
        }

        function drawArrow(ctx, fromX, fromY, toX, toY, color, label) {
            const headlen = 16 / camScale;
            const dx = toX - fromX;
            const dy = toY - fromY;
            const angle = Math.atan2(dy, dx);

            ctx.strokeStyle = color;
            ctx.fillStyle = color;
            ctx.lineWidth = 4 / camScale;

            ctx.beginPath();
            ctx.moveTo(fromX, fromY);
            ctx.lineTo(toX - headlen * Math.cos(angle) * 0.8, toY - headlen * Math.sin(angle) * 0.8);
            ctx.stroke();

            // 箭頭頭部
            ctx.beginPath();
            ctx.moveTo(toX, toY);
            ctx.lineTo(toX - headlen * Math.cos(angle - Math.PI / 6), toY - headlen * Math.sin(angle - Math.PI / 6));
            ctx.lineTo(toX - headlen * Math.cos(angle + Math.PI / 6), toY - headlen * Math.sin(angle + Math.PI / 6));
            ctx.lineTo(toX, toY);
            ctx.fill();

            if (label) {
                ctx.save();
                // 標籤偏移
                const lx = toX + (25 / camScale) * Math.cos(angle);
                const ly = toY + (25 / camScale) * Math.sin(angle);

                // 計算世界座標到螢幕座標
                const screenX = cx + (lx - camX) * camScale;
                const screenY = cy + (ly - camY) * camScale;

                // 重置轉換矩陣為單位矩陣，以原生解析度繪製文字
                ctx.setTransform(1, 0, 0, 1, 0, 0);

                ctx.fillStyle = color;
                ctx.font = 'bold 24px Inter';
                ctx.fillText(label, screenX - 10, screenY + 8);
                ctx.restore();
            }
        }

        const earthSvgStr = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="-100 -100 200 200">
  <defs>
    <radialGradient id="ocean" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="85%" stop-color="rgba(14,165,233,0)"/>
      <stop offset="100%" stop-color="rgba(14,165,233,0.6)"/>
    </radialGradient>
  </defs>
  <!-- 大氣層 -->
  <circle cx="0" cy="0" r="100" fill="url(#glow)" />
  <!-- 海洋與地表底色 -->
  <circle cx="0" cy="0" r="90" fill="url(#ocean)" />
  <!-- 抽象大陸色塊 -->
  <path d="M -40 -60 C -20 -70, 10 -80, 40 -50 C 50 -20, 60 10, 40 40 C 20 30, -10 50, -30 20 C -60 10, -70 -20, -40 -60 Z" fill="#166534" opacity="0.6"/>
  <path d="M 50 -10 C 60 -20, 80 0, 70 30 C 50 40, 40 20, 50 -10 Z" fill="#166534" opacity="0.6"/>
  <path d="M -60 30 C -40 40, -50 70, -70 50 C -80 30, -70 20, -60 30 Z" fill="#166534" opacity="0.6"/>
  <!-- 經緯線網格加強物理感 -->
  <path d="M -90 0 A 90 90 0 0 0 90 0 M -90 0 A 90 45 0 0 0 90 0 M -90 0 A 90 45 0 0 1 90 0" stroke="rgba(255,255,255,0.15)" fill="none" stroke-width="1"/>
  <path d="M 0 -90 A 90 90 0 0 0 0 90 M 0 -90 A 45 90 0 0 0 0 90 M 0 -90 A 45 90 0 0 1 0 90" stroke="rgba(255,255,255,0.15)" fill="none" stroke-width="1"/>
  <!-- 外框圈 -->
  <circle cx="0" cy="0" r="90" fill="none" stroke="#0ea5e9" stroke-width="1" opacity="0.8"/>
</svg>`;
        const earthImg = new Image();
        earthImg.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(earthSvgStr);

        function drawEarth(ctx) {
            const radius = R_E;
            // The SVG viewBox length is 200 (-100 to 100), the actual earth body radius is 90
            // Draw radius is scaled up to match the SVG atmospheric padding
            const drawRadius = radius * (100 / 90);

            if (earthImg.complete) {
                ctx.drawImage(earthImg, -drawRadius, -drawRadius, drawRadius * 2, drawRadius * 2);
            } else {
                ctx.beginPath();
                ctx.arc(0, 0, radius, 0, Math.PI * 2);
                ctx.fillStyle = '#1e3a8a';
                ctx.fill();
            }
        }

        function drawScene() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            updateCamera();

            ctx.save();
            // 移動中心並縮放、平移（物理環境轉換）
            ctx.translate(cx, cy);
            ctx.scale(camScale, camScale);
            ctx.translate(-camX, -camY);

            // 地球
            drawEarth(ctx);

            // 高山 / 發射台
            ctx.strokeStyle = '#94a3b8';
            ctx.lineWidth = 4 / camScale;
            ctx.beginPath();
            ctx.moveTo(0, -R_E);
            ctx.lineTo(0, -(R_E + h0));
            ctx.stroke();

            // 繪製歷史軌跡
            trails.forEach((trail, idx) => {
                const alpha = 0.2 + (idx / trails.length) * 0.3;
                ctx.strokeStyle = `rgba(148, 163, 184, ${alpha})`;
                ctx.lineWidth = 2 / camScale;
                ctx.setLineDash([8 / camScale, 8 / camScale]);
                ctx.beginPath();
                if (trail.length > 0) {
                    ctx.moveTo(trail[0].x, trail[0].y);
                    for (let i = 1; i < trail.length; i++) {
                        ctx.lineTo(trail[i].x, trail[i].y);
                    }
                }
                ctx.stroke();
                ctx.setLineDash([]);
            });

            if (ball.active) {
                // 目前軌跡
                ctx.strokeStyle = '#facc15';
                ctx.lineWidth = 4 / camScale;
                ctx.beginPath();
                if (ball.path.length > 0) {
                    ctx.moveTo(ball.path[0].x, ball.path[0].y);
                    for (let i = 1; i < ball.path.length; i++) {
                        ctx.lineTo(ball.path[i].x, ball.path[i].y);
                    }
                }
                ctx.stroke();

                // 畫球的物理位置
                const bx = ball.x;
                const by = ball.y;

                ctx.fillStyle = '#facc15';
                ctx.beginPath();
                ctx.arc(bx, by, 8 / camScale, 0, Math.PI * 2);
                ctx.fill();

                // 物理向量 (Vector Visualization) 
                const scaleV = 12 / camScale;
                drawArrow(ctx, bx, by, bx + ball.vx * scaleV, by + ball.vy * scaleV, '#0ea5e9', 'v');

                // 重力/向心力加速度 (a)
                const r2 = ball.x * ball.x + ball.y * ball.y;
                const r3 = r2 * Math.sqrt(r2);
                const ax = -GM * ball.x / r3;
                const ay = -GM * ball.y / r3;
                const scaleA = 12000 / camScale;
                drawArrow(ctx, bx, by, bx + ax * scaleA, by + ay * scaleA, '#ef4444', 'g');

            } else {
                // 待命狀態
                const bx = 0;
                const by = -(R_E + h0);

                ctx.fillStyle = '#facc15';
                ctx.beginPath();
                ctx.arc(bx, by, 8 / camScale, 0, Math.PI * 2);
                ctx.fill();

                const scaleV = 12 / camScale;
                drawArrow(ctx, bx, by, bx + v0 * scaleV, by, '#0ea5e9', 'v₀');

                const a0 = GM / ((R_E + h0) ** 2);
                const scaleA = 12000 / camScale;
                drawArrow(ctx, bx, by, bx, by + a0 * scaleA, '#ef4444', 'g');
            }

            ctx.restore();
        }

        const TIME_STEP = 5; // 模擬加速步長(dt)
        const SUB_STEPS = 100; // Euler Method 次級步數提高精度

        function renderLoop() {
            if (isRunning) {
                const dt = TIME_STEP / SUB_STEPS;

                for (let i = 0; i < SUB_STEPS; i++) {
                    const r2 = ball.x * ball.x + ball.y * ball.y;
                    const r = Math.sqrt(r2);
                    const r3 = r2 * r;

                    const ax = -GM * ball.x / r3;
                    const ay = -GM * ball.y / r3;

                    ball.vx += ax * dt;
                    ball.vy += ay * dt;
                    ball.x += ball.vx * dt;
                    ball.y += ball.vy * dt;

                    // 取點繪製軌道
                    if (i === 0) {
                        ball.path.push({ x: ball.x, y: ball.y });
                    }

                    // 碰撞表面
                    if (r <= R_E) {
                        isRunning = false;
                        hudStatus.textContent = "墜毀於地表";
                        hudStatus.style.color = "#ef4444";
                        // 位置推回表面
                        const invR = R_E / r;
                        ball.x *= invR;
                        ball.y *= invR;
                        ball.path.push({ x: ball.x, y: ball.y });
                        break;
                    }

                    // 逃逸
                    if (r > R_E * 6) {
                        isRunning = false;
                        hudStatus.textContent = "物體逃逸";
                        hudStatus.style.color = "#a8a29e";
                        break;
                    }
                }

                if (ball.active) {
                    const currentR = Math.sqrt(ball.x * ball.x + ball.y * ball.y);
                    const currentV = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
                    const currentA = GM / (currentR * currentR) * 1000;

                    liveH.textContent = (currentR - R_E).toFixed(1);
                    liveV.textContent = currentV.toFixed(2);
                    liveA.textContent = currentA.toFixed(2);
                }
            }

            // 確保每一幀都重繪呼叫，以達到平滑的運鏡效果 (Lerp 才會動作)
            drawScene();
            requestAnimationFrame(renderLoop);
        }

        // 初始化第一幀與迴圈
        liveA.textContent = (GM / ((R_E + h0) ** 2) * 1000).toFixed(2);
        requestAnimationFrame(renderLoop);

    </script>
</body>

</html>
