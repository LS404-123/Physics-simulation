<!doctype html>
<html lang="zh-HK">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>圓錐擺 3D 物理模擬</title>
    <!-- Include KaTeX -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css"
    />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"
      onload="renderMathInElement(document.body)"
    ></script>
    <!-- Include Three.js -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <style>
      :root {
        --bg-color: #0f172a;
        --panel-bg: rgba(30, 41, 59, 0.7);
        --modal-bg: rgba(15, 23, 42, 0.95);
        --border-color: rgba(255, 255, 255, 0.15);
        --text-color: #f8fafc;
        --accent-color: #38bdf8;
        --slider-track: #334155;
      }

      body {
        margin: 0; padding: 0; background-color: #000;
        display: flex; justify-content: center; align-items: center; min-height: 100vh;
        font-family: "Inter", -apple-system, sans-serif; color: var(--text-color); overflow: hidden;
      }

      #app {
        width: 1100px; height: 650px; background-color: var(--bg-color); border-radius: 24px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        display: grid; grid-template-columns: 1fr 280px; gap: 12px; padding: 12px;
        box-sizing: border-box; position: relative; border: 1px solid var(--border-color);
      }

      .canvas-container {
        background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        border: 1px solid var(--border-color); backdrop-filter: blur(10px); border-radius: 18px;
        position: relative; overflow: hidden;
      }
      #three-container { width: 100%; height: 100%; }

      .sim-title { position: absolute; top: 15px; left: 20px; z-index: 10; pointer-events: none; }
      .sim-title h1 {
        margin: 0; font-size: 22px; font-weight: 800;
        background: linear-gradient(to right, #fff, #38bdf8);
        -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      }

      .controls { display: flex; flex-direction: column; gap: 8px; height: 100%; }
      .panel {
        background: var(--panel-bg); border: 1px solid var(--border-color);
        backdrop-filter: blur(10px); border-radius: 12px; padding: 8px 10px;
      }
      h2 {
        margin: 0 0 6px 0; font-size: 13px; color: var(--accent-color);
        border-bottom: 1px solid var(--border-color); padding-bottom: 3px;
      }

      .control-group { margin-bottom: 4px; }
      .control-header { display: flex; justify-content: space-between; margin-bottom: 1px; font-size: 11px; }

      input[type="range"] { width: 100%; appearance: none; background: transparent; height: 14px; }
      input[type="range"]::-webkit-slider-thumb {
        appearance: none; height: 12px; width: 12px; border-radius: 50%;
        background: var(--accent-color); cursor: pointer; margin-top: -4px;
      }
      input[type="range"]::-webkit-slider-runnable-track { width: 100%; height: 3px; background: var(--slider-track); border-radius: 2px; }

      .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 6px; }
      button {
        background: rgba(56, 189, 248, 0.05); border: 1px solid var(--accent-color);
        color: var(--accent-color); padding: 5px 2px; border-radius: 6px;
        cursor: pointer; font-size: 10.5px; transition: all 0.2s ease;
        font-family: inherit; font-weight: 500;
      }
      button:hover { background: rgba(56, 189, 248, 0.2); }
      button.active { background: var(--accent-color); color: #0f172a; }

      .graph-container {
        width: 100%; height: 210px; background: rgba(0, 0, 0, 0.4);
        border-radius: 10px; position: relative; overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      #dataGraph { width: 100%; height: 100%; }
      .graph-label { position: absolute; font-size: 9px; color: #94a3b8; }

      .vector-label {
        color: white; font-family: "KaTeX_Main", serif; font-size: 13px;
        background: rgba(15, 23, 42, 0.8); padding: 1px 5px; border-radius: 4px;
        pointer-events: none; white-space: nowrap; border: 1px solid var(--border-color);
      }

      .modal-overlay {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px);
        display: none; justify-content: center; align-items: center; z-index: 100; border-radius: 24px;
      }
      .modal-content {
        background: var(--modal-bg); border: 1px solid var(--border-color);
        padding: 20px; border-radius: 20px; width: 500px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        position: relative; animation: modalFadeIn 0.2s ease;
      }
      .modal-close { position: absolute; top: 10px; right: 15px; background: none; border: none; color: var(--text-color); font-size: 24px; cursor: pointer; }
    </style>
  </head>

  <body>
    <div id="app">
      <div class="canvas-container">
        <div class="sim-title"><h1>圓錐擺 3D 物理模擬</h1></div>
        <div id="three-container"></div>
      </div>

      <div class="controls">
        <div class="panel">
          <h2>數據圖表 (T vs \(\omega\))</h2>
          <div class="graph-container">
            <canvas id="dataGraph"></canvas>
            <div class="graph-label" style="bottom: 5px; right: 10px;">\(\omega\) (rad/s)</div>
            <div class="graph-label" style="top: 5px; left: 10px;">\(T\) (N)</div>
            <button id="btnClearGraph" style="position: absolute; top: 5px; right: 5px; font-size: 8px; padding: 1px 4px;">清除</button>
          </div>
        </div>

        <div class="panel">
          <h2>參數設定</h2>
          <div class="control-group">
            <div class="control-header"><span>週期 \(T\)</span><span id="periodVal">3.60 s</span></div>
            <input type="range" id="periodSlider" min="0.5" max="5.0" step="0.01" value="3.6" />
          </div>
          <div class="control-group">
            <div class="control-header"><span>繩長 \(L\)</span><span id="lengthVal">3.50 m</span></div>
            <input type="range" id="lengthSlider" min="1.0" max="5.0" step="0.01" value="3.5" />
          </div>
          <div class="control-group">
            <div class="control-header"><span>質量 \(m\)</span><span id="massVal">1.00 kg</span></div>
            <input type="range" id="massSlider" min="0.1" max="5.0" step="0.01" value="1.0" />
          </div>

          <div class="button-group">
            <button id="btnPlay">播放 / 暫停</button>
            <button id="btnFBD" class="active">受力圖</button>
            <button id="btnComponents">力分解</button>
            <button id="btnTopView">俯視視角</button>
            <button id="btnTheory" style="grid-column: span 2;">原理說明</button>
          </div>
        </div>
      </div>

      <div id="theoryModal" class="modal-overlay">
        <div class="modal-content">
          <button class="modal-close" onclick="closeModal()">&times;</button>
          <h2 style="border-bottom: 2px solid var(--accent-color); font-size: 18px;">圓錐擺物理原理</h2>
          <div class="theory-content">
            <p>1. <b>幾何關係：</b> \(r = L \sin\theta\)</p>
            <p>2. <b>受力分析：</b></p>
            <ul style="margin-top: -5px;">
              <li>水平：\( T \sin\theta = mr\omega^2 \)</li>
              <li>鉛直：\( T \cos\theta = mg \)</li>
            </ul>
            <div class="theory-highlight"><b>核心推論：</b> \( T = m L \omega^2 \)</div>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import { CSS2DRenderer, CSS2DObject } from "three/addons/renderers/CSS2DRenderer.js";

      const g = 9.81;
      let L = 3.5, targetL = 3.5, P = 3.6, targetP = 3.6, m = 1.0, targetM = 1.0;
      let isRunning = false, showFBD = true, showComponents = false, phase = 0, isTopView = false;

      const recordedData = [];
      const graphCanvas = document.getElementById("dataGraph");
      const ctx = graphCanvas.getContext("2d");
      const MAX_W = 15, MAX_T = 500;

      function recordCurrentData(omega, tension) {
        if (recordedData.length === 0 || Math.abs(recordedData[recordedData.length - 1].omega - omega) > 0.05) {
          recordedData.push({ omega, tension }); recordedData.sort((a,b) => a.omega - b.omega);
        }
      }

      function drawGraph(curW, curT) {
        const w = graphCanvas.width, h = graphCanvas.height; ctx.clearRect(0, 0, w, h);
        const padding = 30, size = Math.min(w - padding * 2, h - padding * 2);
        const offsetX = (w - size) / 2 + 10, offsetY = (h - size) / 2 - 5, scaleX = size / MAX_W, scaleY = size / MAX_T;
        ctx.strokeStyle = "rgba(148, 163, 184, 0.4)"; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(offsetX, offsetY); ctx.lineTo(offsetX, offsetY + size); ctx.lineTo(offsetX + size, offsetY + size); ctx.stroke();
        ctx.setLineDash([2, 4]); ctx.strokeStyle = "rgba(255, 255, 255, 0.05)";
        for(let i=1; i<=5; i++) {
          let gx = offsetX + (MAX_W/5 * i) * scaleX, gy = offsetY + size - (MAX_T/5 * i) * scaleY;
          ctx.beginPath(); ctx.moveTo(gx, offsetY); ctx.lineTo(gx, offsetY+size); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(offsetX, gy); ctx.lineTo(offsetX+size, gy); ctx.stroke();
        }
        ctx.setLineDash([]);
        if (recordedData.length >= 2) {
          ctx.strokeStyle = "#38bdf8"; ctx.lineWidth = 2; ctx.beginPath();
          recordedData.forEach((d, i) => {
            const px = offsetX + Math.min(d.omega, MAX_W) * scaleX, py = offsetY + size - Math.min(d.tension, MAX_T) * scaleY;
            if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
          });
          ctx.stroke();
        }
        ctx.fillStyle = "#f97316"; ctx.beginPath(); ctx.arc(offsetX + Math.min(curW, MAX_W) * scaleX, offsetY + size - Math.min(curT, MAX_T) * scaleY, 4, 0, Math.PI * 2); ctx.fill();
      }

      const container = document.getElementById("three-container");
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
      camera.position.set(6, 4, 10);
      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(container.clientWidth, container.clientHeight);
      container.appendChild(renderer.domElement);
      const labelRenderer = new CSS2DRenderer();
      labelRenderer.setSize(container.clientWidth, container.clientHeight);
      labelRenderer.domElement.style.position = 'absolute'; labelRenderer.domElement.style.top = '0px'; labelRenderer.domElement.style.pointerEvents = 'none';
      container.appendChild(labelRenderer.domElement);
      const controls = new OrbitControls(camera, renderer.domElement); controls.enableDamping = true;
      scene.add(new THREE.AmbientLight(0xffffff, 0.6));
      const dl = new THREE.DirectionalLight(0xffffff, 1); dl.position.set(5, 10, 7); scene.add(dl);

      const pivot = new THREE.Mesh(new THREE.SphereGeometry(0.1, 16, 16), new THREE.MeshPhongMaterial({ color: 0x64748b }));
      pivot.position.set(0, 3, 0); scene.add(pivot);
      const grid = new THREE.GridHelper(10, 10, 0x334155, 0x1e293b); grid.position.y = -2.5; scene.add(grid);
      const axisLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,3.1,0), new THREE.Vector3(0,-2.5,0)]), new THREE.LineDashedMaterial({ color: 0x475569, dashSize: 0.2, gapSize: 0.1 }));
      axisLine.computeLineDistances(); scene.add(axisLine);
      const ball = new THREE.Mesh(new THREE.SphereGeometry(0.2, 32, 32), new THREE.MeshPhongMaterial({ color: 0xffffff })); scene.add(ball);
      const stringLine = new THREE.Line(new THREE.BufferGeometry(), new THREE.LineBasicMaterial({ color: 0x94a3b8 })); scene.add(stringLine);
      const orbitGeo = new THREE.BufferGeometry().setFromPoints(Array.from({length: 129}, (_, i) => { const a = (i/128)*Math.PI*2; return new THREE.Vector3(Math.cos(a), 0, Math.sin(a)); }));
      const orbitLine = new THREE.LineLoop(orbitGeo, new THREE.LineDashedMaterial({ color: 0x38bdf8, dashSize: 0.1, gapSize: 0.05 }));
      orbitLine.computeLineDistances(); scene.add(orbitLine);
      const motionPlane = new THREE.Mesh(new THREE.CircleGeometry(1, 64), new THREE.MeshBasicMaterial({ color: 0xf97316, transparent: true, opacity: 0.1, side: THREE.DoubleSide }));
      motionPlane.rotation.x = -Math.PI / 2; scene.add(motionPlane);
      const radiusLine = new THREE.Line(new THREE.BufferGeometry(), new THREE.LineDashedMaterial({ color: 0xfacc15, dashSize: 0.1, gapSize: 0.05 })); scene.add(radiusLine);
      function createLabel(t) { const d = document.createElement('div'); d.className = 'vector-label'; d.textContent = t; return new CSS2DObject(d); }
      const rLabel = createLabel('r'); scene.add(rLabel);
      const arrows = {
        mg: { arrow: new THREE.ArrowHelper(new THREE.Vector3(0,-1,0), new THREE.Vector3(), 1, 0xef4444, 0.2, 0.1), label: createLabel('mg') },
        T: { arrow: new THREE.ArrowHelper(new THREE.Vector3(0,1,0), new THREE.Vector3(), 1, 0xf97316, 0.2, 0.1), label: createLabel('T') },
        Tx: { arrow: new THREE.ArrowHelper(new THREE.Vector3(-1,0,0), new THREE.Vector3(), 1, 0x10b981, 0.15, 0.08), label: createLabel('Fc') },
        Ty: { arrow: new THREE.ArrowHelper(new THREE.Vector3(0,1,0), new THREE.Vector3(), 1, 0x10b981, 0.15, 0.08), label: createLabel('Ty') }
      };
      Object.values(arrows).forEach(it => { scene.add(it.arrow); scene.add(it.label); });

      const pSlider = document.getElementById("periodSlider"), lSlider = document.getElementById("lengthSlider"), mSlider = document.getElementById("massSlider");
      const updateValues = () => {
        targetP = parseFloat(pSlider.value); targetL = parseFloat(lSlider.value); targetM = parseFloat(mSlider.value);
        document.getElementById("periodVal").textContent = targetP.toFixed(2) + " s";
        document.getElementById("lengthVal").textContent = targetL.toFixed(2) + " m";
        document.getElementById("massVal").textContent = targetM.toFixed(2) + " kg";
        const curW = (2 * Math.PI) / targetP; let cosT = g / (targetL * curW * curW), th = cosT < 1 ? Math.acos(cosT) : 0;
        recordCurrentData(curW, th > 0 ? (targetM * g) / Math.cos(th) : targetM * g);
      };
      pSlider.oninput = lSlider.oninput = mSlider.oninput = updateValues;
      document.getElementById("btnPlay").onclick = (e) => { isRunning = !isRunning; e.target.className = isRunning ? "active" : ""; };
      document.getElementById("btnFBD").onclick = (e) => { showFBD = !showFBD; e.target.className = showFBD ? "active" : ""; };
      document.getElementById("btnComponents").onclick = (e) => { showComponents = !showComponents; e.target.className = showComponents ? "active" : ""; };
      document.getElementById("btnTheory").onclick = () => { document.getElementById("theoryModal").style.display = 'flex'; };
      document.getElementById("btnClearGraph").onclick = () => { recordedData.length = 0; };
      document.getElementById("btnTopView").onclick = (e) => {
        isTopView = !isTopView; e.target.className = isTopView ? "active" : "";
        if (isTopView) { camera.position.set(0, 12, 0); controls.target.set(0, 1, 0); }
        else { camera.position.set(6, 4, 10); controls.target.set(0, 1, 0); }
      };
      window.closeModal = () => { document.getElementById("theoryModal").style.display = 'none'; };

      function update() {
        const dt = (performance.now() - lastTime) / 1000; lastTime = performance.now();
        P += (targetP - P) * 0.1; L += (targetL - L) * 0.1; m += (targetM - m) * 0.1;
        const omega = (2 * Math.PI) / P; if (isRunning) phase += omega * dt;
        let cosT = g / (L * omega * omega), theta = cosT < 1 ? Math.acos(cosT) : 0;
        const r = L * Math.sin(theta), h = L * Math.cos(theta), Ten = theta > 0 ? (m * g) / Math.cos(theta) : m * g;
        ball.position.set(r * Math.cos(phase), 3 - h, r * Math.sin(phase)); ball.scale.setScalar(0.8 + m * 0.2);
        stringLine.geometry.setFromPoints([pivot.position, ball.position]);
        orbitLine.position.y = motionPlane.position.y = ball.position.y;
        orbitLine.scale.set(r, 1, r); motionPlane.scale.set(r, r, 1);
        orbitLine.visible = motionPlane.visible = theta > 0;
        radiusLine.geometry.setFromPoints([new THREE.Vector3(0, ball.position.y, 0), ball.position]);
        radiusLine.computeLineDistances(); radiusLine.visible = theta > 0;
        
        // --- 核心修改：在俯視圖隱藏所有標籤 ---
        rLabel.visible = theta > 0 && !isTopView;
        rLabel.position.set(ball.position.x/2, ball.position.y, ball.position.z/2);

        const vMg = Math.min(0.5 + Math.sqrt(m*g)*0.15, 2.5), tDir = new THREE.Vector3().subVectors(pivot.position, ball.position).normalize();
        arrows.mg.arrow.position.copy(ball.position); arrows.mg.arrow.setLength(vMg);
        arrows.mg.label.position.copy(ball.position).setY(ball.position.y - vMg - 0.2);
        arrows.T.arrow.position.copy(ball.position); arrows.T.arrow.setDirection(tDir); arrows.T.arrow.setLength(Math.min(0.5 + Math.sqrt(Ten)*0.15, 2.5));
        arrows.T.label.position.copy(ball.position).add(tDir.clone().multiplyScalar(Math.min(0.5 + Math.sqrt(Ten)*0.15, 2.5) + 0.2));
        const cDir = new THREE.Vector3(0, ball.position.y, 0).sub(ball.position).normalize(), fcl = Math.min(0.5 + Math.sqrt(m*omega*omega*r)*0.15, 2.5);
        arrows.Tx.arrow.position.copy(ball.position); arrows.Tx.arrow.setDirection(cDir); arrows.Tx.arrow.setLength(fcl);
        arrows.Tx.label.position.copy(ball.position).add(cDir.clone().multiplyScalar(fcl + 0.2));
        arrows.Ty.arrow.position.copy(ball.position); arrows.Ty.arrow.setLength(vMg);
        arrows.Ty.label.position.copy(ball.position).setY(ball.position.y + vMg + 0.2);
        
        Object.values(arrows).forEach(a => { 
          a.arrow.visible = showFBD; 
          a.label.visible = showFBD && !isTopView; // 隱藏標籤
        });
        arrows.Tx.arrow.visible = showComponents && theta > 0;
        arrows.Tx.label.visible = showComponents && theta > 0 && !isTopView; // 隱藏標籤
        arrows.Ty.arrow.visible = showComponents && theta > 0;
        arrows.Ty.label.visible = showComponents && theta > 0 && !isTopView; // 隱藏標籤

        drawGraph(omega, Ten); controls.update(); renderer.render(scene, camera); labelRenderer.render(scene, camera);
        requestAnimationFrame(update);
      }
      let lastTime = performance.now();
      function onResize() {
        const w = container.clientWidth, h = container.clientHeight;
        camera.aspect = w / h; camera.updateProjectionMatrix(); renderer.setSize(w, h); labelRenderer.setSize(w, h);
        graphCanvas.width = graphCanvas.offsetWidth; graphCanvas.height = graphCanvas.offsetHeight;
      }
      window.addEventListener("resize", onResize); onResize(); update();
    </script>
  </body>
</html>
