<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拋體運動模擬 | Projectile Motion</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <style>
        :root {
            --bg-color: #1a1c24;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.25);
            --accent-blue: #00d2ff;
            --accent-green: #00ff88;
            --text-main: #ffffff;
            --text-dim: #cccccc;
        }

        body {
            margin: 0;
            padding: 0;
            width: 1100px;
            height: 650px;
            background-color: var(--bg-color);
            background-image:
                radial-gradient(circle at 20% 30%, rgba(0, 210, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 255, 136, 0.05) 0%, transparent 40%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            color: var(--text-main);
        }

        .container {
            width: 1060px;
            height: 610px;
            display: grid;
            grid-template-columns: 1fr 300px;
            grid-template-rows: auto 1fr;
            gap: 20px;
            padding: 20px;
        }

        .header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modern-title {
            font-family: 'Outfit', sans-serif;
            font-size: 28px;
            margin: 0;
            background: linear-gradient(135deg, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 600;
        }

        .bento-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .canvas-area {
            grid-row: 2;
            position: relative;
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .controls {
            grid-row: 2;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-label {
            font-size: 14px;
            color: var(--text-dim);
            font-weight: 500;
        }

        .control-value {
            font-family: 'Outfit', sans-serif;
            font-size: 18px;
            color: var(--accent-blue);
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent-blue);
            cursor: pointer;
        }

        .toggle-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 5px;
        }

        .toggle-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            cursor: pointer;
            color: var(--text-dim);
        }

        .toggle-item input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--accent-blue);
            cursor: pointer;
        }

        .data-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        .data-item {
            display: flex;
            flex-direction: column;
        }

        .data-label {
            font-size: 12px;
            color: var(--text-dim);
        }

        .data-value {
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            color: var(--text-main);
        }

        button {
            margin-top: auto;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--accent-blue), #0072ff);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        button:active {
            transform: scale(0.95);
        }

        button.reset {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1 class="modern-title">斜向拋體運動模擬</h1>
            <div style="font-size: 14px; color: var(--text-dim);">Physical Simulation v1.2</div>
        </div>

        <div class="bento-card canvas-area">
            <canvas id="simCanvas"></canvas>
        </div>

        <div class="controls">
            <div class="bento-card control-group">
                <div class="control-label">初速度 $v_0$</div>
                <div class="control-value"><span id="v0Display">50</span> m/s</div>
                <input type="range" id="v0Input" min="10" max="100" value="50" step="1">
            </div>

            <div class="bento-card control-group">
                <div class="control-label">發射角度 $\theta$</div>
                <div class="control-value"><span id="angleDisplay">45</span>°</div>
                <input type="range" id="angleInput" min="0" max="90" value="45" step="1">
            </div>

            <div class="bento-card toggle-group">
                <div class="control-label" style="margin-bottom: 5px;">視覺選項</div>
                <label class="toggle-item"><input type="checkbox" id="showLines" checked> 顯示投影線</label>
                <label class="toggle-item"><input type="checkbox" id="showStrobe" checked> 間隔記錄 (Strobe)</label>
                <label class="toggle-item"><input type="checkbox" id="showTrace" checked> 軌跡殘影</label>
            </div>

            <button id="startBtn">開始模擬</button>
            <button id="resetBtn" class="reset">重設</button>
        </div>
    </div>

    <script>
        /**
         * 繪製帶有標籤的物理向量箭頭
         */
        function drawArrow(ctx, x1, y1, x2, y2, color, label, width = 2, labelPos = 'auto', isDashed = false) {
            const dx = x2 - x1;
            const dy = y2 - y1;
            const length = Math.sqrt(dx * dx + dy * dy);
            if (length < 1) return;
            const headlen = Math.min(10, length * 0.4);
            const angle = Math.atan2(dy, dx);
            ctx.save();
            ctx.strokeStyle = ctx.fillStyle = color;
            ctx.lineWidth = width;
            if (isDashed) ctx.setLineDash([4, 2]);
            ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2 - headlen * Math.cos(angle) * 0.8, y2 - headlen * Math.sin(angle) * 0.8); ctx.stroke();
            ctx.setLineDash([]);
            ctx.beginPath(); ctx.moveTo(x2, y2);
            ctx.lineTo(x2 - headlen * Math.cos(angle - Math.PI / 6), y2 - headlen * Math.sin(angle - Math.PI / 6));
            ctx.lineTo(x2 - headlen * Math.cos(angle + Math.PI / 6), y2 - headlen * Math.sin(angle + Math.PI / 6));
            ctx.closePath(); ctx.fill();
            if (label && labelPos !== 'none') {
                ctx.font = 'italic 13px "Inter", sans-serif';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                const offset = 20;
                let [tx, ty] = [x2, y2];
                if (labelPos === 'auto') { tx += offset * Math.cos(angle); ty += offset * Math.sin(angle); }
                else { const posMap = { top: [0, -offset], bottom: [0, offset], left: [-offset, 0], right: [offset, 0] }; const delta = posMap[labelPos] || [0, 0]; tx += delta[0]; ty += delta[1]; }
                ctx.strokeStyle = 'rgba(10, 10, 12, 0.8)'; ctx.lineWidth = 3; ctx.strokeText(label, tx, ty); ctx.fillText(label, tx, ty);
            }
            ctx.restore();
        }

        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');

        const v0Input = document.getElementById('v0Input');
        const angleInput = document.getElementById('angleInput');
        const v0Display = document.getElementById('v0Display');
        const angleDisplay = document.getElementById('angleDisplay');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const showLines = document.getElementById('showLines');
        const showStrobe = document.getElementById('showStrobe');
        const showTrace = document.getElementById('showTrace');

        const g = 9.8;
        let scale = 2.0;
        let origin = { x: 70, y: 0 };

        let t = 0;
        let isRunning = false;
        let animationId = null;
        let trajectory = [];
        let strobePoints = [];
        let strobeInterval = 0.5; // Will be calculated dynamically

        let v0 = parseFloat(v0Input.value);
        let theta = parseFloat(angleInput.value) * Math.PI / 180;

        function updateScale() {
            const maxRange = (100 * 100) / g;
            const maxWidth = canvas.width - origin.x - 100;
            const targetScale = maxWidth / maxRange;
            scale = Math.min(2.5, Math.max(0.6, targetScale));
        }

        function calculateStrobeInterval() {
            const vy0 = v0 * Math.sin(theta);
            if (vy0 <= 0) { strobeInterval = 1000; return; }
            const tTotal = (2 * vy0) / g;
            strobeInterval = tTotal / 10;
        }

        function resize() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            origin.y = canvas.height - 70;
            updateScale();
            draw();
        }

        window.addEventListener('resize', resize);
        resize();

        v0Input.oninput = () => { v0 = parseFloat(v0Input.value); v0Display.textContent = v0; reset(); };
        angleInput.oninput = () => { theta = parseFloat(angleInput.value) * Math.PI / 180; angleDisplay.textContent = angleInput.value; reset(); };
        [showLines, showStrobe, showTrace].forEach(el => el.onchange = draw);

        function reset() {
            isRunning = false;
            t = 0; trajectory = []; strobePoints = [];
            calculateStrobeInterval();
            if (animationId) cancelAnimationFrame(animationId);
            draw();
            startBtn.textContent = '開始模擬';
        }

        startBtn.onclick = () => {
            if (!isRunning) {
                const vy0 = v0 * Math.sin(theta);
                if (t > 0 && vy0 * t - 0.5 * g * t * t <= 0.01) reset();
                isRunning = true;
                startBtn.textContent = '暫停';
                animate();
            } else {
                isRunning = false;
                startBtn.textContent = '繼續';
                cancelAnimationFrame(animationId);
            }
        };

        resetBtn.onclick = reset;

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Grid (Brighter)
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)'; ctx.lineWidth = 1;
            for (let i = 0; i < canvas.width; i += 50 * scale) { ctx.beginPath(); ctx.moveTo(origin.x + i, 0); ctx.lineTo(origin.x + i, canvas.height); ctx.stroke(); }
            for (let i = 0; i < canvas.height; i += 50 * scale) { ctx.beginPath(); ctx.moveTo(0, origin.y - i); ctx.lineTo(canvas.width, origin.y - i); ctx.stroke(); }

            // Axis (Brighter)
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.7)'; ctx.lineWidth = 2.5; ctx.beginPath();
            ctx.moveTo(origin.x, 20); ctx.lineTo(origin.x, canvas.height - 20);
            ctx.moveTo(20, origin.y); ctx.lineTo(canvas.width - 20, origin.y); ctx.stroke();
            drawArrow(ctx, origin.x, origin.y, origin.x, 20, 'rgba(255,255,255,0.7)', 'y', 2.5, 'none');
            drawArrow(ctx, origin.x, origin.y, canvas.width - 20, origin.y, 'rgba(255,255,255,0.7)', 'x', 2.5, 'none');

            // Physics
            const vx = v0 * Math.cos(theta); const vy0 = v0 * Math.sin(theta);
            const x = vx * t; const y = Math.max(0, vy0 * t - 0.5 * g * t * t);
            const vy = vy0 - g * t; const v_curr = Math.sqrt(vx * vx + vy * vy);

            const vy0_reset = v0 * Math.sin(theta);
            const tTotal = (2 * vy0_reset) / g;

            if (isRunning && t >= tTotal) {
                isRunning = false; t = tTotal;
                startBtn.textContent = '重放'; cancelAnimationFrame(animationId);
            }

            const px = origin.x + x * scale; const py = origin.y - y * scale;

            // Trajectory
            if (showTrace.checked && trajectory.length > 1) {
                ctx.beginPath(); ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)'; ctx.setLineDash([5, 5]);
                ctx.moveTo(origin.x + trajectory[0].x * scale, origin.y - trajectory[0].y * scale);
                for (let i = 1; i < trajectory.length; i++) ctx.lineTo(origin.x + trajectory[i].x * scale, origin.y - trajectory[i].y * scale);
                ctx.stroke(); ctx.setLineDash([]);
            }

            // Strobe Recordings (Offset from axes, higher opacity)
            if (showStrobe.checked) {
                const markerOffset = 18;
                strobePoints.forEach(p => {
                    const sx = origin.x + p.x * scale;
                    const sy = origin.y - p.y * scale;
                    // X Axis Strobe (Offset down)
                    ctx.fillStyle = 'rgba(0, 210, 255, 0.8)';
                    ctx.beginPath(); ctx.arc(sx, origin.y + markerOffset, 5, 0, Math.PI * 2); ctx.fill();
                    // Y Axis Strobe (Offset left)
                    ctx.fillStyle = 'rgba(0, 255, 136, 0.8)';
                    ctx.beginPath(); ctx.arc(origin.x - markerOffset, sy, 5, 0, Math.PI * 2); ctx.fill();
                });
            }

            // Projections
            if (showLines.checked) {
                ctx.lineWidth = 1.5; ctx.setLineDash([6, 3]);
                ctx.strokeStyle = 'var(--accent-blue)'; ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(px, origin.y); ctx.stroke();
                ctx.strokeStyle = 'var(--accent-green)'; ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(origin.x, py); ctx.stroke();
                ctx.setLineDash([]);
            }

            if (t === 0) {
                // Initial Velocity Vector
                drawArrow(ctx, px, py, px + (v0 * Math.cos(theta)) * 0.8, py - (v0 * Math.sin(theta)) * 0.8, 'rgba(255,255,255,0.8)', 'v\u2080', 3);

                // Launch Angle Arc & Label
                const arcRad = 35;
                ctx.strokeStyle = 'var(--accent-blue)';
                ctx.lineWidth = 1.2;
                ctx.beginPath();
                ctx.arc(origin.x, origin.y, arcRad, 0, -theta, true);
                ctx.stroke();

                // Label theta (\u03B8)
                ctx.fillStyle = 'var(--accent-blue)';
                ctx.font = 'italic 13px "Inter", sans-serif';
                ctx.textAlign = 'left';
                const labelAngle = -theta / 2;
                const lx = origin.x + (arcRad + 10) * Math.cos(labelAngle);
                const ly = origin.y + (arcRad + 10) * Math.sin(labelAngle);
                ctx.fillText('\u03B8', lx, ly);
            }

            // Ball
            ctx.shadowBlur = 15; ctx.shadowColor = 'rgba(0, 210, 255, 0.4)';
            const grad = ctx.createRadialGradient(px - 4, py - 4, 3, px, py, 12);
            grad.addColorStop(0, '#fff'); grad.addColorStop(0.3, '#4fd1ff'); grad.addColorStop(1, '#0072ff');
            ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(px, py, 12, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0;
        }

        function animate() {
            if (!isRunning) return;
            const dt = 0.03; // Slightly smaller step for smoother dynamic check

            const nextT = t + dt;
            const vy0 = v0 * Math.sin(theta);
            const tTotal = (2 * vy0) / g;

            // Check if we crossed a strobe interval
            const countBefore = Math.floor((t + 0.0001) / strobeInterval);
            const countAfter = Math.floor((nextT + 0.0001) / strobeInterval);

            if (countAfter > countBefore && countAfter <= 10) {
                const st = countAfter * strobeInterval;
                const vx = v0 * Math.cos(theta);
                strobePoints.push({ x: vx * st, y: Math.max(0, vy0 * st - 0.5 * g * st * st) });
            }

            t = nextT;
            if (t > tTotal) t = tTotal;

            const vx = v0 * Math.cos(theta);
            if (t % 0.12 < 0.03) trajectory.push({ x: vx * t, y: Math.max(0, vy0 * t - 0.5 * g * t * t) });

            draw();
            if (isRunning) animationId = requestAnimationFrame(animate);
        }

        reset(); // Initial setup
    </script>
</body>

</html>
