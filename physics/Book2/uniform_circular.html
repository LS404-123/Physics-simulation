<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圓周運動物理模擬器 - iPad 優化版</title>
    <!-- MathJax for LaTeX -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']]
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.25);
            --primary-accent: #00d2ff;
            --force-color: #ff4757;
            --velocity-color: #2ed573;
            --text-color: #ffffff;
            --card-inner-bg: rgba(0, 0, 0, 0.2);
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            background: radial-gradient(circle at center, #2a5298 0%, #1e3c72 100%);
            font-family: 'PingFang HK', 'Helvetica Neue', sans-serif;
            color: var(--text-color);
            overflow: hidden;
        }

        /* iPad Air 規格容器: 1100 * 650, 居中且置頂 */
        #app-container {
            width: 1100px;
            height: 650px;
            /* 移除額外邊距，確保 650px 高度完全符合 viewport */
            position: relative;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            padding: 16px;
            /* 稍微縮減內邊距以騰出空間 */
            box-sizing: border-box;
            gap: 16px;
            /* 統一間隔 */
            overflow: hidden;
            /* 強制限制所有內部元素在圓角框內 */
        }

        /* 上方畫布區域 - 統一為 Bento Card 風格 */
        .canvas-section {
            flex: 1;
            min-height: 0;
            background: rgba(255, 255, 255, 0.05);
            /* 毛玻璃底色 */
            border-radius: 20px;
            position: relative;
            border: 1px solid var(--glass-border);
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        /* 畫布內容器（深色區域），確保模擬視覺清晰 */
        .canvas-inner {
            width: 100%;
            height: 100%;
            background: var(--card-inner-bg);
            border-radius: 12px;
            /* 內縮圓角 */
            position: relative;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* 下方 Bento Box 功能區 */
        .bento-grid {
            display: grid;
            grid-template-columns: 240px 1fr 240px;
            gap: 16px;
            /* 統一 Gap */
            height: 210px;
            /* 增加高度確保內部按鈕與文字不擠壓 */
        }

        .bento-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            /* 統一圓角 */
            padding: 15px;
            border: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            /* 確保內容不超出卡片 */
        }

        h2 {
            margin: 0 0 8px 0;
            font-size: 1rem;
            color: var(--primary-accent);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        p {
            margin: 2px 0;
            font-size: 0.85rem;
            line-height: 1.3;
            opacity: 0.8;
        }

        /* 按鈕優化 */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        button {
            padding: 10px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            color: white;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            color: white;
        }

        .btn-reset {
            background: rgba(255, 255, 255, 0.15);
            color: white;
        }

        .btn-anim {
            background: linear-gradient(135deg, #f1c40f, #e67e22);
            color: white;
        }

        button:active {
            transform: scale(0.95);
            opacity: 0.8;
        }

        /* 物理公式顯大 */
        .formula-card {
            align-items: center;
            background: rgba(0, 0, 0, 0.25);
        }

        #math-formula {
            font-size: 1.3rem;
            color: #fff;
        }

        /* 圖例 */
        .legend-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 6px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
        }

        .indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            box-shadow: 0 0 8px currentColor;
        }

        /* 狀態標籤 - 更加 Bento 化 */
        .status-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            padding: 6px 14px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            font-size: 0.8rem;
            border: 1px solid rgba(255, 255, 255, 0.15);
            z-index: 10;
            color: var(--primary-accent);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>

<body>

    <div id="app-container">
        <!-- 上方：模擬動態區 (大 Bento Box) -->
        <div class="canvas-section">
            <div class="canvas-inner">
                <div id="status" class="status-badge">狀態：穩定圓周運動中</div>
                <canvas id="simCanvas"></canvas>
            </div>
        </div>

        <!-- 下方：Bento Box 控制中心 -->
        <div class="bento-grid">
            <!-- 控制欄 -->
            <div class="bento-card controls">
                <button class="btn-primary" onclick="togglePlay()" id="playPauseBtn">暫停模擬 (顯示位移)</button>
                <button class="btn-danger" onclick="cutString()" id="cutBtn">切斷向心力 (切線飛出)</button>
                <button class="btn-anim" onclick="playCentrifugalAnim()" id="cfAnimBtn">離心現象動畫 (車廂與乘客)</button>
                <button class="btn-reset" onclick="resetSim()">重置模擬</button>
            </div>

            <!-- 物理圖像與公式核心 -->
            <div class="bento-card formula-card">
                <h2>物理運動規律</h2>
                <div id="math-formula">
                    $$ F_c = \frac{mv^2}{r} \quad \vec{v} \perp \vec{F_c} $$
                </div>
                <p style="margin-top:10px; text-align:center;">當 \( F_c = 0 \)，則 \( \vec{a} = 0 \)，物體沿 \( \vec{v} \)
                    方向直線運動</p>
            </div>

            <!-- 視覺參考 -->
            <div class="bento-card">
                <h2>圖例說明</h2>
                <div class="legend-grid">
                    <div class="legend-item">
                        <div class="indicator" style="background: var(--velocity-color); color: var(--velocity-color);">
                        </div>
                        <span>瞬時速度 \( v \) (切線方向)</span>
                    </div>
                    <div class="legend-item">
                        <div class="indicator" style="background: #f1c40f; color: #f1c40f;"></div>
                        <span>預期位置 (慣性)</span>
                    </div>
                    <div class="legend-item">
                        <div class="indicator" style="background: #ff9f43; color: #ff9f43;"></div>
                        <span>離心推力 (向外落差)</span>
                    </div>
                </div>
            </div>
        </div>

        <script>
            const canvas = document.getElementById('simCanvas');
            const ctx = canvas.getContext('2d');
            const statusBadge = document.getElementById('status');

            let isRunning = true;
            let isCut = false;
            let isCentrifugalAnim = false;
            let anim_t = 0;
            const max_anim_t = 18; // 稍微加長動畫時間，讓紅點位移更明顯，箭頭更好畫
            let animStartAngle = 0;

            let angle = 0;
            const radius = 130;
            const speed = 0.025;

            let obj = {
                x: 0, y: 0,
                vx: 0, vy: 0,
                history: []
            };

            // Camera state
            let currentZoom = 1;
            let camX = 0;
            let camY = 0;

            function init() {
                resize();
                resetSim();
                animate();
            }

            function resize() {
                // 取得畫布容器的實際寬高
                const rect = canvas.parentElement.getBoundingClientRect();
                canvas.width = rect.width;
                canvas.height = rect.height;

                // 如果在暫停狀態下調整視窗大小，強制重繪畫面避免出現空白
                if (!isRunning && typeof drawFrame === 'function') {
                    drawFrame();
                }
            }

            function resetSim() {
                isCut = false;
                isRunning = true;
                isCentrifugalAnim = false;
                angle = 0;

                // 確保初始位置正確設定
                const rect = canvas.parentElement.getBoundingClientRect();
                obj.x = (rect.width / 2) + radius;
                obj.y = (rect.height / 2);

                camX = rect.width / 2;
                camY = rect.height / 2;
                currentZoom = 1;

                obj.history = [];
                statusBadge.innerText = "狀態：穩定圓周運動中";
                statusBadge.style.borderColor = "var(--primary-accent)";
                statusBadge.style.color = "white";
                document.getElementById('playPauseBtn').innerText = "暫停模擬 (顯示離心力)";
                document.getElementById('cutBtn').disabled = false;
                document.getElementById('cutBtn').style.opacity = "1";
                document.getElementById('cfAnimBtn').disabled = false;
                document.getElementById('cfAnimBtn').style.opacity = "1";
            }

            function togglePlay() {
                isRunning = !isRunning;
                isCentrifugalAnim = false; // 取消動畫狀態
                document.getElementById('playPauseBtn').innerText = isRunning ? "暫停模擬 (顯示離心力)" : "繼續模擬";

                if (!isRunning && !isCut) {
                    statusBadge.innerText = "狀態：已暫停 (觀察離心力 / 慣性力)";
                    statusBadge.style.borderColor = "#f1c40f";
                    statusBadge.style.color = "#f1c40f";
                } else if (!isCut) {
                    statusBadge.innerText = "狀態：穩定圓周運動中";
                    statusBadge.style.borderColor = "var(--primary-accent)";
                    statusBadge.style.color = "white";
                }
            }

            function cutString() {
                if (isCut) return;
                isCut = true;
                statusBadge.innerText = "狀態：向心力消失，遵循慣性定律";
                statusBadge.style.borderColor = "var(--force-color)";
                statusBadge.style.color = "var(--force-color)";

                document.getElementById('cutBtn').disabled = true;
                document.getElementById('cutBtn').style.opacity = "0.3";
                document.getElementById('cfAnimBtn').disabled = true;
                document.getElementById('cfAnimBtn').style.opacity = "0.3";

                // 計算切線速度向量 (保持真實比例 px/frame)
                obj.vx = -Math.sin(angle) * (radius * speed);
                obj.vy = Math.cos(angle) * (radius * speed);
            }

            function playCentrifugalAnim() {
                if (isCut) return; // 切斷狀態下不播放
                isRunning = false;
                isCentrifugalAnim = true;
                anim_t = 0;
                animStartAngle = angle;

                statusBadge.innerText = "狀態：播放離心現象動畫 (觀察內部紅點)";
                statusBadge.style.borderColor = "#f1c40f";
                statusBadge.style.color = "#f1c40f";
                document.getElementById('playPauseBtn').innerText = "恢復模擬";
            }

            // 修改 drawArrow：升級極短距離的繪製邏輯，確保三角形不變形
            function drawArrow(x, y, vx, vy, color, headlen = 16, endOffset = 0) {
                let len = Math.hypot(vx, vy);
                if (len <= endOffset + 1) return; // 如果距離太短則不畫

                // 將向量縮短 endOffset 的距離，確保箭頭停在目標邊緣
                const drawLen = len - endOffset;
                const ratio = drawLen / len;
                const actualVx = vx * ratio;
                const actualVy = vy * ratio;

                // 根據縮放調整線寬與箭頭大小，保持視覺一致性 (除以 currentZoom)
                const currentHeadlen = Math.min(headlen, Math.max(4, drawLen * 0.7)) / currentZoom;
                const currentLineWidth = Math.min(4, Math.max(1.5, drawLen * 0.25)) / currentZoom;

                const endX = x + actualVx;
                const endY = y + actualVy;
                const a = Math.atan2(actualVy, actualVx);

                // 將箭身末端往回縮 (setback)，確保完全被三角形箭頭覆蓋，不會從尖端穿出
                const setback = currentHeadlen * 0.75;
                const lineEndX = endX - setback * Math.cos(a);
                const lineEndY = endY - setback * Math.sin(a);

                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(lineEndX, lineEndY);
                ctx.strokeStyle = color;
                ctx.lineWidth = currentLineWidth; // 使用動態線寬
                ctx.lineCap = 'butt'; // 改為平頭避免圓弧端點超出
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(endX, endY);
                ctx.lineTo(endX - currentHeadlen * Math.cos(a - Math.PI / 7), endY - currentHeadlen * Math.sin(a - Math.PI / 7));
                ctx.lineTo(endX - currentHeadlen * Math.cos(a + Math.PI / 7), endY - currentHeadlen * Math.sin(a + Math.PI / 7));
                ctx.closePath();
                ctx.fillStyle = color;
                ctx.fill();
            }

            function animate() {
                // 1. 物理狀態更新 (僅在運行時計算)
                if (isRunning) {
                    if (!isCut) {
                        // 圓周運動狀態
                        angle += speed;
                        obj.x = (canvas.width / 2) + radius * Math.cos(angle);
                        obj.y = (canvas.height / 2) + radius * Math.sin(angle);

                        obj.history.push({ x: obj.x, y: obj.y });
                        if (obj.history.length > 80) obj.history.shift();
                    } else {
                        // 切線直線運動狀態 (移除乘數以保持原速率)
                        obj.x += obj.vx;
                        obj.y += obj.vy;

                        obj.history.push({ x: obj.x, y: obj.y });
                        if (obj.history.length > 80) obj.history.shift();
                    }
                } else if (isCentrifugalAnim) {
                    // 離心現象慢動作動畫更新
                    if (anim_t < max_anim_t) {
                        anim_t += 0.12; // 更慢的慢動作播放
                    }
                    angle = animStartAngle + speed * anim_t;
                    obj.x = (canvas.width / 2) + radius * Math.cos(angle);
                    obj.y = (canvas.height / 2) + radius * Math.sin(angle);

                    obj.history.push({ x: obj.x, y: obj.y });
                    if (obj.history.length > 80) obj.history.shift();
                }

                // 2. 攝影機縮放與追蹤邏輯 (調低權重讓過渡更平滑絲滑)
                const targetZoom = isCentrifugalAnim ? 2.5 : 1.0;
                currentZoom += (targetZoom - currentZoom) * 0.05;

                const targetCamX = isCentrifugalAnim ? obj.x : canvas.width / 2;
                const targetCamY = isCentrifugalAnim ? obj.y : canvas.height / 2;
                camX += (targetCamX - camX) * 0.05;
                camY += (targetCamY - camY) * 0.05;

                // 3. 畫面繪製
                drawFrame();

                requestAnimationFrame(animate);
            }

            function drawFrame() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                ctx.save();
                // 應用攝影機變換：以畫布中心為基準縮放，並追蹤目標
                ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.scale(currentZoom, currentZoom);
                ctx.translate(-camX, -camY);

                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;

                // 1. 繪製參考圓心
                ctx.beginPath();
                ctx.arc(centerX, centerY, 6, 0, Math.PI * 2);
                ctx.fillStyle = varColor('--primary-accent');
                ctx.fill();

                if (!isCut) {
                    // 繪製軌跡虛線
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                    ctx.strokeStyle = "rgba(255,255,255,0.15)";
                    ctx.setLineDash([8, 8]);
                    ctx.stroke();
                    ctx.setLineDash([]);

                    // 將 vx 和 vy 提早計算，讓後方的動畫與靜態位移都能使用
                    const vx = -Math.sin(angle);
                    const vy = Math.cos(angle);

                    if (!isCentrifugalAnim) {
                        // 繪製受力線 (繩子)
                        ctx.beginPath();
                        ctx.moveTo(centerX, centerY);
                        ctx.lineTo(obj.x, obj.y);
                        ctx.strokeStyle = "rgba(255,255,255,0.2)";
                        ctx.lineWidth = 2 / currentZoom;
                        ctx.stroke();

                        // 繪製向量
                        // 向心力 (向內)
                        drawArrow(obj.x, obj.y, (centerX - obj.x) * 0.6, (centerY - obj.y) * 0.6, varColor('--force-color'));

                        // 速度 (切線) - 統一箭頭長度視覺
                        const vScale = 80;
                        drawArrow(obj.x, obj.y, vx * vScale, vy * vScale, varColor('--velocity-color'));
                    }

                    // === 新增：暫停時對比「慣性位移」與「實際距離」以解釋離心力來源 ===
                    if (!isRunning && !isCentrifugalAnim) {
                        const futureFrames = 35; // 誇張化時間間隔，讓差距明顯可見

                        // 1. 慣性預測位置 P1 (如果沒有向心力，沿切線走)
                        const p1_x = obj.x + vx * (radius * speed) * futureFrames;
                        const p1_y = obj.y + vy * (radius * speed) * futureFrames;

                        // 2. 計算 P1 距離圓心的角度，用以精確找出對應的「徑向」圓周位置 P_arc
                        // 這樣差距箭頭就會完美地從圓心向外指
                        const angleP1 = Math.atan2(p1_y - centerY, p1_x - centerX);
                        const parc_x = centerX + radius * Math.cos(angleP1);
                        const parc_y = centerY + radius * Math.sin(angleP1);

                        // 繪製從圓心到 P1 的徑向輔助虛線，強調「向外」的視覺
                        ctx.beginPath();
                        ctx.moveTo(centerX, centerY);
                        ctx.lineTo(p1_x, p1_y);
                        ctx.strokeStyle = "rgba(255, 255, 255, 0.15)";
                        ctx.lineWidth = 1 / currentZoom;
                        ctx.setLineDash([4 / currentZoom, 4 / currentZoom]);
                        ctx.stroke();
                        ctx.setLineDash([]);

                        // 繪製慣性位移線 (原切線方向)
                        ctx.beginPath();
                        ctx.moveTo(obj.x, obj.y);
                        ctx.lineTo(p1_x, p1_y);
                        ctx.strokeStyle = varColor('--velocity-color');
                        ctx.lineWidth = 2 / currentZoom;
                        ctx.setLineDash([6 / currentZoom, 6 / currentZoom]);
                        ctx.stroke();
                        ctx.setLineDash([]);

                        // 繪製 P1: 慣性幽靈球 (黃色)
                        ctx.beginPath();
                        ctx.arc(p1_x, p1_y, 10, 0, Math.PI * 2);
                        ctx.strokeStyle = "#f1c40f";
                        ctx.stroke();

                        // 繪製 P_arc: 實際半徑位置的幽靈球 (白色)
                        ctx.beginPath();
                        ctx.arc(parc_x, parc_y, 10, 0, Math.PI * 2);
                        ctx.strokeStyle = "rgba(255, 255, 255, 0.8)";
                        ctx.stroke();

                        // 繪製從 P_arc 到 P1 的徑向差距箭頭 (橘黃色) - 完美向外指向
                        drawArrow(parc_x, parc_y, p1_x - parc_x, p1_y - parc_y, "#ff9f43");

                        // --- 智能文字排版：文字簡化並貼近對應元素，防止重疊 ---
                        ctx.font = `bold ${13 / currentZoom}px 'PingFang HK', sans-serif`;

                        // 1. 預期位置 (黃色文字，放在 P1 外側)
                        // 利用角度判斷，自動將文字往外緣推
                        ctx.fillStyle = "#f1c40f";
                        ctx.textAlign = Math.cos(angleP1) >= 0 ? "left" : "right";
                        ctx.textBaseline = Math.sin(angleP1) >= 0 ? "top" : "bottom";
                        const textOffset = 15 / currentZoom;
                        ctx.fillText("預期位置", p1_x + Math.cos(angleP1) * textOffset, p1_y + Math.sin(angleP1) * textOffset);

                        // 2. 實際位置 (白色文字，放在 P_arc 內側，朝向圓心)
                        // 方向與預期位置剛好相反，保證一內一外絕不重疊
                        ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
                        ctx.textAlign = Math.cos(angleP1) >= 0 ? "right" : "left";
                        ctx.textBaseline = Math.sin(angleP1) >= 0 ? "bottom" : "top";
                        ctx.fillText("實際位置", parc_x - Math.cos(angleP1) * textOffset, parc_y - Math.sin(angleP1) * textOffset);

                        // 3. 離心推力 (橘黃色文字，放在差距箭頭的旁邊)
                        // 將文字沿著切線方向 (轉 90 度) 推移，避免擋住徑向的箭頭
                        const midX = (p1_x + parc_x) / 2;
                        const midY = (p1_y + parc_y) / 2;
                        const tangX = Math.cos(angleP1 + Math.PI / 2);
                        const tangY = Math.sin(angleP1 + Math.PI / 2);

                        ctx.fillStyle = "#ff9f43";
                        ctx.textAlign = tangX >= 0 ? "left" : "right";
                        ctx.textBaseline = tangY >= 0 ? "top" : "bottom";
                        ctx.fillText("離心推力", midX + tangX * (12 / currentZoom), midY + tangY * (12 / currentZoom));

                        // 恢復預設對齊，以免影響其他繪圖
                        ctx.textAlign = "left";
                        ctx.textBaseline = "alphabetic";
                    }

                } else {
                    // 切線直線運動狀態向量
                    // 保持與圓周運動相同的箭頭長度 vScale = 80
                    const vScale = 80;
                    const currentSpeed = Math.hypot(obj.vx, obj.vy);
                    const unitVx = obj.vx / currentSpeed;
                    const unitVy = obj.vy / currentSpeed;

                    drawArrow(obj.x, obj.y, unitVx * vScale, unitVy * vScale, varColor('--velocity-color'));

                    // 顯示原本的圓形路徑作為對比
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                    ctx.strokeStyle = "rgba(255,255,255,0.05)";
                    ctx.stroke();
                }

                // 繪製淡出軌跡
                ctx.beginPath();
                if (obj.history.length > 0) {
                    ctx.moveTo(obj.history[0].x, obj.history[0].y);
                    for (let i = 1; i < obj.history.length; i++) {
                        ctx.lineTo(obj.history[i].x, obj.history[i].y);
                    }
                }
                ctx.strokeStyle = "rgba(255, 255, 255, 0.3)";
                ctx.lineWidth = 2 / currentZoom;
                ctx.stroke();

                // === 計算內部紅點 (乘客) 的位置與軌跡參數 ===
                let dotX = obj.x;
                let dotY = obj.y;
                let startX, startY, tangent_vx, tangent_vy, maxDotX, maxDotY;

                if (isCentrifugalAnim) {
                    // 在動畫中，紅點遵循起點的切線慣性運動
                    startX = centerX + radius * Math.cos(animStartAngle);
                    startY = centerY + radius * Math.sin(animStartAngle);
                    tangent_vx = -Math.sin(animStartAngle) * (radius * speed);
                    tangent_vy = Math.cos(animStartAngle) * (radius * speed);

                    dotX = startX + tangent_vx * anim_t;
                    dotY = startY + tangent_vy * anim_t;

                    // 計算綠色虛線的最遠點
                    maxDotX = startX + tangent_vx * max_anim_t;
                    maxDotY = startY + tangent_vy * max_anim_t;
                }

                // 1. 繪製主角球體 (車廂) - 半徑加大至 22 讓內部點更清楚，並加上微透效果
                ctx.save();
                ctx.shadowBlur = 20;
                ctx.shadowColor = "white";
                ctx.beginPath();
                ctx.arc(obj.x, obj.y, 22, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(255, 255, 255, 0.85)";
                ctx.fill();
                ctx.restore();

                // 2. 繪製內部紅點 (乘客)
                ctx.beginPath();
                ctx.arc(dotX, dotY, 5, 0, Math.PI * 2);
                ctx.fillStyle = "#ff4757"; // 紅色
                ctx.fill();

                // 3. 將綠色切線慣性軌跡移至【最上層】，壓過車廂與紅點
                if (isCentrifugalAnim) {
                    ctx.beginPath();
                    ctx.moveTo(startX, startY);
                    ctx.lineTo(maxDotX, maxDotY);
                    ctx.strokeStyle = varColor('--velocity-color'); // 使用速度(切線)的綠色
                    ctx.globalAlpha = 0.9; // 提高不透明度，在最上層更顯眼
                    ctx.lineWidth = 2.5 / currentZoom;
                    ctx.setLineDash([5 / currentZoom, 5 / currentZoom]); // 虛線效果
                    ctx.stroke();
                    ctx.setLineDash([]);
                    ctx.globalAlpha = 1.0;
                }

                // 4. 離心動畫結束後的說明標籤與完美黃色小箭頭
                if (isCentrifugalAnim && anim_t >= max_anim_t) {
                    // 使用縮小的箭頭頭部 (headlen = 10)，並提早 6px 結束以精準貼齊紅點邊緣
                    drawArrow(obj.x, obj.y, dotX - obj.x, dotY - obj.y, "#f1c40f", 10, 6);

                    ctx.fillStyle = "#f1c40f";
                    // 增加字體大小，視覺上約佔畫布 1/4 寬度，並根據縮放調整
                    const fontSize = 24 / currentZoom;
                    ctx.font = `bold ${fontSize}px 'PingFang HK', sans-serif`;
                    
                    const align = dotX > centerX ? "left" : "right";
                    ctx.textAlign = align;
                    // 進一步加大偏移量（100 單位），確保大字體完全不與車廂重疊
                    const offset = (dotX > centerX ? 100 : -100) / currentZoom;

                    ctx.fillText("紅點(乘客)因慣性而偏離車廂中心", obj.x + offset, obj.y - (fontSize * 0.7));
                    ctx.fillText("這就是「離心力」的本質！", obj.x + offset, obj.y + (fontSize * 0.7));
                    ctx.textAlign = "left";
                }

                ctx.restore(); // 結束縮放變換
            }

            function varColor(name) {
                return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
            }

            // 啟動
            window.onload = init;
            // 監聽窗口大小改變
            window.addEventListener('resize', resize);

        </script>

</body>
