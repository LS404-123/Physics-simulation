<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>車輛圓周運動與打滑模擬 - 物理實驗室</title>
    <!-- KaTeX for LaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" onload="renderMathInElement(document.body, {
        delimiters: [
            {left: '$$', right: '$$', display: true},
            {left: '$', right: '$', display: false},
            {left: '\\(', right: '\\)', display: false},
            {left: '\\[', right: '\\]', display: true}
        ],
        throwOnError : false
    });"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-blue: #0ea5e9;
            --accent-red: #ef4444;
            --accent-green: #10b981;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --card-radius: 20px;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', 'Inter', "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* iPad Air Layout: 1100x650 */
        .app-container {
            width: 1100px;
            height: 650px;
            display: grid;
            grid-template-columns: 1fr 320px;
            grid-template-rows: 1fr 200px;
            gap: 20px;
            padding: 20px;
            box-sizing: border-box;
        }

        .bento-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: var(--card-radius);
            padding: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            overflow: hidden;
            position: relative;
        }

        /* Canvas Box */
        .canvas-box {
            grid-area: 1 / 1 / 3 / 2;
            padding: 0;
            background: rgba(0, 0, 0, 0.2);
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Control Box */
        .control-box {
            grid-area: 1 / 2 / 2 / 3;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Theory Box */
        .theory-box {
            grid-area: 2 / 1 / 3 / 2;
            display: flex;
            gap: 20px;
        }

        /* Data Box */
        .data-box {
            grid-area: 2 / 2 / 3 / 3;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 8px;
        }

        h2 {
            margin: 0 0 10px 0;
            font-size: 18px;
            font-weight: 600;
            color: var(--accent-blue);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 14px;
            color: var(--text-dim);
            display: flex;
            justify-content: space-between;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }

        .weather-toggle {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .weather-btn {
            flex: 1;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .weather-btn.active {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
        }

        .weather-btn.rainy.active {
            background: #3b82f6;
        }

        .action-btn {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--accent-blue), #3b82f6);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: auto;
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        .data-item {
            display: flex;
            justify-content: space-between;
            font-size: 15px;
            padding: 5px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .data-value {
            font-weight: 600;
            font-family: 'Monaco', monospace;
        }

        .status-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--accent-green);
            color: var(--accent-green);
            z-index: 10;
        }

        .status-badge.warning {
            color: #fbbf24;
            border-color: #fbbf24;
        }

        .status-badge.danger {
            color: var(--accent-red);
            border-color: var(--accent-red);
        }

        .theory-content {
            flex: 1;
            font-size: 14px;
            line-height: 1.5;
            color: var(--text-dim);
        }

        .theory-content b {
            color: var(--text-main);
        }

        /* Stability Monitor Styles */
        .stability-monitor {
            margin-top: 10px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .bar-container {
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            position: relative;
            margin: 15px 0 25px 0;
        }

        .limit-marker {
            position: absolute;
            top: -4px;
            bottom: -4px;
            width: 3px;
            background: var(--accent-red);
            z-index: 5;
            box-shadow: 0 0 10px var(--accent-red);
            transition: left 0.3s ease;
        }

        .limit-label {
            position: absolute;
            top: -18px;
            font-size: 10px;
            color: var(--accent-red);
            font-weight: 600;
            transform: translateX(-50%);
            white-space: nowrap;
        }

        .current-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-blue), #38bdf8);
            border-radius: 6px;
            transition: width 0.1s linear, background 0.3s;
            width: 0%;
        }

        .current-fill.danger {
            background: var(--accent-red);
            animation: pulse 0.8s infinite;
        }

        .monitor-info {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 5px;
        }

        @keyframes pulse {
            0% {
                filter: brightness(1);
            }

            50% {
                filter: brightness(1.5);
            }

            100% {
                filter: brightness(1);
            }
        }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- 模擬區 -->
        <div class="bento-card canvas-box">
            <div id="status" class="status-badge">狀態：準備中</div>
            <canvas id="simCanvas"></canvas>
        </div>

        <!-- 控制區 -->
        <div class="bento-card control-box">
            <h2>⚙️ 模擬控制</h2>

            <div class="control-group">
                <label>
                    <span class="label-title">車速 $v$:</span>
                    <span class="label-value"><span id="v-val">30</span> $m/s$</span>
                </label>
                <input type="range" id="v-slider" min="10" max="80" value="30">
            </div>

            <div class="control-group">
                <label>
                    <span class="label-title">半徑 $r$:</span>
                    <span class="label-value"><span id="r-val">400</span> $m$</span>
                </label>
                <input type="range" id="r-slider" min="220" max="580" value="400">
            </div>

            <div class="control-group">
                <label>天氣狀況 (影響摩擦力)</label>
                <div class="weather-toggle">
                    <button class="weather-btn active" id="sunny-btn">☀️ 晴天</button>
                    <button class="weather-btn rainy" id="rainy-btn">🌧️ 雨天</button>
                </div>
            </div>

            <button class="action-btn" id="start-btn">開始模擬</button>
            <button class="action-btn" id="reset-btn"
                style="background: rgba(255,255,255,0.1); margin-top: 10px;">重置</button>
        </div>

        <!-- 數據區 -->
        <div class="bento-card data-box" style="justify-content: flex-start;">
            <h2>📊 穩定性監測</h2>

            <div class="stability-monitor">
                <div class="monitor-info">
                    <span style="color:var(--text-dim)">所需向心加速度 $a_c$:</span>
                    <span class="data-value" id="ac-data">0.0</span>
                </div>
                <div class="bar-container">
                    <div id="ac-bar" class="current-fill"></div>
                    <div id="fmax-marker" class="limit-marker">
                        <div class="limit-label">極限</div>
                    </div>
                </div>
                <div style="font-size: 11px; color: var(--text-dim); text-align: right; margin-top: 5px;">
                    與路面極限對比 (單位: $m/s^2$)
                </div>
            </div>

            <div class="data-item" style="margin-top: 15px; padding: 0 10px;">
                <span>最大摩擦力 $\mu g$:</span>
                <span><span class="data-value" id="fmax-data">0.0</span> $m/s^2$</span>
            </div>
            <div class="data-item" style="padding: 0 10px;">
                <span>臨界速度 $v_{max}$:</span>
                <span><span class="data-value" id="vmax-data">0.0</span> $m/s$</span>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const vSlider = document.getElementById('v-slider');
        const rSlider = document.getElementById('r-slider');
        const vVal = document.getElementById('v-val');
        const rVal = document.getElementById('r-val');
        const sunnyBtn = document.getElementById('sunny-btn');
        const rainyBtn = document.getElementById('rainy-btn');
        const startBtn = document.getElementById('start-btn');
        const resetBtn = document.getElementById('reset-btn');
        const statusBadge = document.getElementById('status');

        const g = 9.81;
        let mu = 0.8;
        let speed = 30;
        let radius = 400;
        let isRunning = false;
        let isSkidding = false;

        let carPos = { x: 0, y: 0 };
        let carVel = { x: 0, y: 0 };
        let carAngle = -Math.PI / 4;
        let lastTime = 0;
        let trajectory = []; // 存儲運動軌跡
        let rainDrops = []; // 雨滴記錄
        let isRainy = false; // 是否正在下雨
        // 座標與縮放變數
        const scale = 0.8; // 大幅調整比例以適應廣闊軌道
        const trackRadius = 400; // 固定軌道半徑
        let centerX, centerY;


        function updateData() {
            const ac = (speed * speed) / radius;
            const fmax = mu * g;
            const vmax = Math.sqrt(mu * g * radius);

            document.getElementById('ac-data').innerText = ac.toFixed(1);
            document.getElementById('fmax-data').innerText = fmax.toFixed(1);
            document.getElementById('vmax-data').innerText = vmax.toFixed(1);

            // 更新穩定性監測儀表 (量程設為 15 m/s^2 作為 100%)
            const maxRange = 15;
            const acBar = document.getElementById('ac-bar');
            const fmaxMarker = document.getElementById('fmax-marker');

            acBar.style.width = Math.min((ac / maxRange) * 100, 100) + '%';
            fmaxMarker.style.left = Math.min((fmax / maxRange) * 100, 100) + '%';

            if (ac > fmax) {
                acBar.classList.add('danger');
            } else {
                acBar.classList.remove('danger');
            }

            vVal.innerText = speed;
            rVal.innerText = radius.toFixed(0);
        }

        /**
         * 採用 physics-viz-vectors 規範的高品質向量繪製函數
         */
        function drawArrow(ctx, x1, y1, x2, y2, color, label, width = 4) {
            const dx = x2 - x1;
            const dy = y2 - y1;
            const length = Math.sqrt(dx * dx + dy * dy);
            if (length < 2) return;

            const angle = Math.atan2(dy, dx);
            // 箭頭大小隨向量動態縮放，最大設為 15
            const headlen = Math.min(15, length * 0.3);

            ctx.save();
            ctx.strokeStyle = ctx.fillStyle = color;
            ctx.lineWidth = width;

            // 保留老師喜愛的 Neon 發光效果
            ctx.shadowBlur = 8;
            ctx.shadowColor = color;

            // 繪製箭身 (稍微縮短以避免粗線穿透箭頭)
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2 - headlen * Math.cos(angle) * 0.5, y2 - headlen * Math.sin(angle) * 0.5);
            ctx.stroke();

            // 繪製實心箭頭
            ctx.beginPath();
            ctx.moveTo(x2, y2);
            ctx.lineTo(x2 - headlen * Math.cos(angle - Math.PI / 6), y2 - headlen * Math.sin(angle - Math.PI / 6));
            ctx.lineTo(x2 - headlen * Math.cos(angle + Math.PI / 6), y2 - headlen * Math.sin(angle + Math.PI / 6));
            ctx.closePath();
            ctx.fill();

            // 繪製專業標籤 (帶描邊)
            if (label) {
                ctx.font = 'italic bold 22px "Times New Roman", serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                // 智能偏移：標籤位於箭頭延伸方向
                const offset = 25;
                const tx = x2 + offset * Math.cos(angle);
                const ty = y2 + offset * Math.sin(angle);

                // 文字描邊確保高度清晰
                ctx.shadowBlur = 0; // 關閉發光以利文字閱讀
                ctx.lineWidth = 4;
                ctx.strokeStyle = 'rgba(15, 23, 42, 0.8)'; // 深色背景描邊
                ctx.strokeText(label, tx, ty);
                ctx.fillText(label, tx, ty);
            }
            ctx.restore();
        }

        // 角度定義：0 度為垂直向上
        // Canvas 角度 = 物理角度 - PI/2
        function toCanvasAngle(physAngle) {
            return physAngle - Math.PI / 2;
        }

        function drawRoad() {
            const laneWidth = 120 * scale; // 大幅增加每條線道的視覺寬度
            const outerR = trackRadius * scale + 1.5 * laneWidth;
            const innerR = trackRadius * scale - 1.5 * laneWidth;
            const lane1 = trackRadius * scale + 0.5 * laneWidth;
            const lane2 = trackRadius * scale - 0.5 * laneWidth;

            // 背景格線
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.width; i += 40) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            }
            for (let j = 0; j < canvas.height; j += 40) {
                ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(canvas.width, j); ctx.stroke();
            }

            // 路面主體 (採用更深色的瀝青質感)
            ctx.beginPath();
            ctx.arc(centerX, centerY, outerR, toCanvasAngle(-Math.PI / 4) - 0.05, toCanvasAngle(Math.PI / 4) + 0.05);
            ctx.arc(centerX, centerY, innerR, toCanvasAngle(Math.PI / 4) + 0.05, toCanvasAngle(-Math.PI / 4) - 0.05, true);
            ctx.fillStyle = '#1e293b';
            ctx.fill();

            // 道路邊界實線
            ctx.strokeStyle = '#64748b';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(centerX, centerY, outerR, toCanvasAngle(-Math.PI / 4), toCanvasAngle(Math.PI / 4));
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(centerX, centerY, innerR, toCanvasAngle(-Math.PI / 4), toCanvasAngle(Math.PI / 4));
            ctx.stroke();

            // 內部虛線 (3線道劃分)
            ctx.save();
            ctx.setLineDash([15, 15]);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.beginPath(); ctx.arc(centerX, centerY, lane1, toCanvasAngle(-Math.PI / 4), toCanvasAngle(Math.PI / 4)); ctx.stroke();
            ctx.beginPath(); ctx.arc(centerX, centerY, lane2, toCanvasAngle(-Math.PI / 4), toCanvasAngle(Math.PI / 4)); ctx.stroke();
            ctx.restore();

            // 圓心標記 (供教學參考)
            ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.beginPath();
            ctx.arc(centerX, centerY, 5, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawCar(x, y, angle) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);

            // 車影
            ctx.shadowBlur = 15;
            ctx.shadowColor = isSkidding ? 'rgba(239, 68, 68, 0.6)' : 'rgba(14, 165, 233, 0.6)';

            // 輪胎
            ctx.fillStyle = '#333';
            const wheelW = 8;
            const wheelH = 12;
            ctx.fillRect(-18, -14, wheelH, wheelW); // 左後
            ctx.fillRect(-18, 6, wheelH, wheelW);  // 右後
            ctx.fillRect(6, -14, wheelH, wheelW);  // 左前
            ctx.fillRect(6, 6, wheelH, wheelW);   // 右前

            // 車身 (圓角矩形樣式)
            ctx.fillStyle = isSkidding ? '#ef4444' : '#f8fafc';
            ctx.strokeStyle = isSkidding ? '#b91c1c' : '#0ea5e9';
            ctx.lineWidth = 2;

            const w = 36;
            const h = 20;
            ctx.beginPath();
            ctx.roundRect(-18, -10, w, h, 8);
            ctx.fill();
            ctx.stroke();

            // 擋風玻璃
            ctx.fillStyle = '#334155';
            ctx.beginPath();
            ctx.roundRect(4, -8, 8, 16, 2);
            ctx.fill();

            ctx.restore();
        }

        function animate(currentTime) {
            requestAnimationFrame(animate);

            if (!lastTime) {
                lastTime = currentTime;
                return;
            }
            const dt = Math.min((currentTime - lastTime) / 1000, 0.1); // 限制 dt 避免跳躍
            lastTime = currentTime;

            // 1. 物理邏輯與數據更新 (僅在 isRunning 為 true 時執行)
            if (isRunning) {
                const dx_px = carPos.x - centerX;
                const dy_px = carPos.y - centerY;
                const r_px = Math.sqrt(dx_px * dx_px + dy_px * dy_px);
                const r_phys = r_px / scale;

                const currentSpeed = Math.sqrt(carVel.x * carVel.x + carVel.y * carVel.y) / scale;
                const ac_req = r_phys > 0 ? (currentSpeed * currentSpeed) / r_phys : 0;
                const ac_limit = mu * g;

                if (ac_req > ac_limit + 0.1) {
                    if (!isSkidding) {
                        isSkidding = true;
                        statusBadge.innerText = '狀態：正在打滑！';
                        statusBadge.className = 'status-badge danger';
                    }
                } else if (isSkidding && ac_req < ac_limit) {
                    isSkidding = false;
                    statusBadge.innerText = '狀態：恢復穩定';
                    statusBadge.className = 'status-badge';
                }

                const a_applied = Math.min(ac_req, ac_limit);
                const ux = -dx_px / r_px;
                const uy = -dy_px / r_px;

                const ax_px = ux * a_applied * scale;
                const ay_px = uy * a_applied * scale;

                carVel.x += ax_px * dt;
                carVel.y += ay_px * dt;
                carPos.x += carVel.x * dt;
                carPos.y += carVel.y * dt;

                trajectory.push({ x: carPos.x, y: carPos.y });

                if (r_phys > 580) {
                    isRunning = false;
                    statusBadge.innerText = '狀態：車輛駛離路面';
                    statusBadge.className = 'status-badge danger';
                }

                const currentPhysAngle = Math.atan2(dx_px, -dy_px);
                if (!isSkidding && currentPhysAngle >= Math.PI / 4) {
                    isRunning = false;
                    statusBadge.innerText = '狀態：安全結束轉彎';
                    statusBadge.className = 'status-badge';
                }

                updateDataRealtime(ac_req, ac_limit, currentSpeed, r_phys);
            }

            // 2. 渲染流程 (常駐繪製)
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawRoad();
            drawTrajectory();

            if (isRainy) drawRain(); // 環境效果與 isRunning 無開，只受天氣控制

            const headingAngle = Math.atan2(carVel.y, carVel.x);
            drawCar(carPos.x, carPos.y, headingAngle);

            if (isRunning) {
                const dx_px = carPos.x - centerX;
                const dy_px = carPos.y - centerY;
                const r_px = Math.sqrt(dx_px * dx_px + dy_px * dy_px);
                const r_phys = r_px / scale;
                const currentSpeed = Math.sqrt(carVel.x * carVel.x + carVel.y * carVel.y) / scale;
                const ac_req = r_phys > 0 ? (currentSpeed * currentSpeed) / r_phys : 0;
                const ac_limit = mu * g;
                const a_applied = Math.min(ac_req, ac_limit);

                const ux = -dx_px / r_px;
                const uy = -dy_px / r_px;

                drawArrow(ctx, carPos.x, carPos.y,
                    carPos.x + carVel.x * 0.8,
                    carPos.y + carVel.y * 0.8,
                    isSkidding ? '#ef4444' : '#4ade80', 'v');

                const fLen_px = a_applied * 16 * scale;
                drawArrow(ctx, carPos.x, carPos.y,
                    carPos.x + ux * fLen_px,
                    carPos.y + uy * fLen_px,
                    '#fb7185', 'f');
            }
        }

        function drawTrajectory() {
            if (trajectory.length < 2) return;

            ctx.save();
            ctx.beginPath();
            ctx.strokeStyle = 'rgba(56, 189, 248, 0.3)'; // 降低軌道透明度以配合下雨
            ctx.lineWidth = 3;
            // 軌跡發光
            ctx.shadowBlur = 4;
            ctx.shadowColor = '#0ea5e9';

            ctx.moveTo(trajectory[0].x, trajectory[0].y);
            for (let i = 1; i < trajectory.length; i++) {
                ctx.lineTo(trajectory[i].x, trajectory[i].y);
            }
            ctx.stroke();
            ctx.restore();
        }

        // --- 雨天動畫系統 ---
        function initRain() {
            rainDrops = [];
            for (let i = 0; i < 120; i++) {
                rainDrops.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    l: Math.random() * 20 + 10, // 雨絲長度
                    s: Math.random() * 15 + 10  // 下墜速度
                });
            }
        }

        function drawRain() {
            ctx.save();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)'; // 高透明度
            ctx.lineWidth = 1;
            ctx.beginPath();
            for (let drop of rainDrops) {
                ctx.moveTo(drop.x, drop.y);
                // 稍微傾斜的雨絲
                ctx.lineTo(drop.x + 2, drop.y + drop.l);

                // 更新位置
                drop.y += drop.s;
                drop.x += 1.5; // 風向偏移

                // 循環邊界
                if (drop.y > canvas.height) {
                    drop.y = -20;
                    drop.x = Math.random() * canvas.width;
                }
            }
            ctx.stroke();
            ctx.restore();
        }

        // 為了在模擬中能看到跳動的數據，拆分一個實時更新函數
        function updateDataRealtime(ac, fmax, currentV, currentR) {
            document.getElementById('ac-data').innerText = ac.toFixed(1);
            document.getElementById('fmax-data').innerText = fmax.toFixed(1);
            document.getElementById('vmax-data').innerText = Math.sqrt(fmax * currentR).toFixed(1);

            const maxRange = 15;
            const acBar = document.getElementById('ac-bar');
            const fmaxMarker = document.getElementById('fmax-marker');

            acBar.style.width = Math.min((ac / maxRange) * 100, 100) + '%';
            fmaxMarker.style.left = Math.min((fmax / maxRange) * 100, 100) + '%';

            if (ac > fmax) {
                acBar.classList.add('danger');
            } else {
                acBar.classList.remove('danger');
            }

            vVal.innerText = currentV.toFixed(0);
            rVal.innerText = currentR.toFixed(0);
        }

        function initCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;

            centerX = canvas.width / 2;
            centerY = canvas.height / 2 + (trackRadius * scale * (1 + Math.cos(Math.PI / 4))) / 2;

            resetSim();
            updateData();

            // 啟動全時渲染循環
            requestAnimationFrame(animate);
        }

        function resetSim() {
            isRunning = false;
            isSkidding = false;
            carAngle = -Math.PI / 4;
            lastTime = 0;
            trajectory = []; // 清空軌跡

            // 基於 trackRadius 進行中心對正
            centerX = canvas.width / 2;
            centerY = canvas.height / 2 + (trackRadius * scale * (1 + Math.cos(Math.PI / 4))) / 2;

            carPos.x = centerX + radius * scale * Math.sin(carAngle);
            carPos.y = centerY - radius * scale * Math.cos(carAngle);

            // 初始化初速度向量 (px/s)
            // 物理速度 (v) -> 像素速度 (v * scale)
            carVel.x = (speed * scale) * Math.cos(carAngle);
            carVel.y = (speed * scale) * Math.sin(carAngle);

            statusBadge.innerText = '狀態：準備中';
            statusBadge.className = 'status-badge';

            vSlider.disabled = false;
            rSlider.disabled = false;
            sunnyBtn.disabled = false;
            rainyBtn.disabled = false;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawRoad();
            drawCar(carPos.x, carPos.y, carAngle);
            updateData();
        }

        startBtn.onclick = () => {
            if (isRunning) return;
            isRunning = true;
            lastTime = performance.now(); // 確保計時平滑連續
            rSlider.disabled = true;
            sunnyBtn.disabled = true;
            rainyBtn.disabled = true;
        };

        resetBtn.onclick = resetSim;

        vSlider.oninput = (e) => {
            speed = parseInt(e.target.value);
            updateData();
            if (!isRunning) {
                resetSim();
            } else {
                // 如果正在模擬，即時調整速度向量大小 (px/s)
                const currentV_px = Math.sqrt(carVel.x * carVel.x + carVel.y * carVel.y);
                if (currentV_px > 0) {
                    carVel.x = (carVel.x / currentV_px) * (speed * scale);
                    carVel.y = (carVel.y / currentV_px) * (speed * scale);
                }
            }
        };

        rSlider.oninput = (e) => {
            radius = parseInt(e.target.value);
            updateData();
            if (!isRunning) resetSim();
        };

        sunnyBtn.onclick = () => {
            mu = 0.8;
            isRainy = false;
            sunnyBtn.classList.add('active');
            rainyBtn.classList.remove('active');
            updateData();
        };

        rainyBtn.onclick = () => {
            mu = 0.4;
            isRainy = true;
            initRain(); // 初始化雨滴
            rainyBtn.classList.add('active');
            sunnyBtn.classList.remove('active');
            updateData();
        };

        window.onload = initCanvas;
    </script>
</body>

</html>
