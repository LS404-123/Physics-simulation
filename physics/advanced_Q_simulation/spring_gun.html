<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>彈簧槍能量守恆模擬</title>

    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/contrib/auto-render.min.js"
        onload="renderMathInElement(document.body);"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Inter:wght@300;400;600&display=swap');

        :root {
            --primary: #1a1a2e;
            /* Darker background */
            --secondary: #16213e;
            --accent: #0f3460;
            --neon-blue: #00d2ff;
            --neon-pink: #e20074;
            --neon-green: #39ff14;
            --bg-glass: rgba(255, 255, 255, 0.05);
            --border-glass: rgba(255, 255, 255, 0.1);
            --text-main: #e0e0e0;
        }

        body {
            font-family: 'Inter', "Microsoft JhengHei", sans-serif;
            background-color: #0f0f13;
            /* Deep dark background */
            background-image: radial-gradient(circle at center, #1a1a24 0%, #000 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            /* Align top */
            height: 100vh;
            overflow: hidden;
            color: var(--text-main);
            padding-top: 20px;
            /* Slight offset from top */
        }

        .ipad-container {
            width: 1100px;
            height: 650px;
            display: grid;
            grid-template-columns: 350px 1fr;
            grid-template-rows: auto 1fr;
            gap: 20px;
            box-sizing: border-box;
            background: rgba(20, 20, 30, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid var(--border-glass);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            padding: 20px;
        }

        .header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
        }

        .modern-title {
            font-family: 'Outfit', sans-serif;
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(135deg, #fff 0%, var(--neon-blue) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        /* Bento Box Cards */
        .bento-card {
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 20px;
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.02);
            display: flex;
            flex-direction: column;
        }

        .controls-panel {
            grid-column: 1 / 2;
            overflow-y: auto;
        }

        /* Dark canvas for neon vectors */
        .simulation-panel {
            grid-column: 2 / 3;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0e;
            /* Darker background inside SVG container */
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.8);
        }

        h2 {
            font-size: 18px;
            margin-top: 0;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--neon-blue);
            padding-bottom: 5px;
            display: inline-block;
            color: #fff;
        }

        .explanation {
            font-size: 14px;
            line-height: 1.6;
            color: #b0c4de;
            margin-bottom: 20px;
        }

        strong {
            color: #fff;
        }

        .math-block {
            background: rgba(0, 0, 0, 0.4);
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            font-size: 16px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e0e0e0;
        }

        .btn-play {
            background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin-top: auto;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
        }

        .btn-play:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 210, 255, 0.5);
            filter: brightness(1.1);
        }

        .btn-reset {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin-top: 10px;
        }

        .btn-reset:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: #fff;
        }

        .back-link {
            text-decoration: none;
            color: #b0c4de;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #fff;
        }

        /* Speed Panel */
        .speed-panel {
            position: absolute;
            top: 20px;
            right: 30px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: rgba(15, 23, 42, 0.8);
            padding: 20px 24px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            color: #f8fafc;
            display: none;
        }

        .speed-panel h4 {
            margin: 0 0 8px 0;
            color: #38bdf8;
            font-size: 16px;
        }

        .speed-stats {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .stat {
            display: flex;
            justify-content: space-between;
            width: 200px;
            font-size: 15px;
            font-variant-numeric: tabular-nums;
        }

        .stat .label {
            color: #94a3b8;
        }

        /* SVG Styles - Neon Theme */
        svg {
            width: 100%;
            height: 100%;
            user-select: none;
        }

        .tube-line {
            stroke: #444;
            stroke-width: 6;
            stroke-linecap: round;
        }

        .spring {
            stroke: #888;
            stroke-width: 4;
            fill: none;
            stroke-linejoin: round;
        }

        .projectile {
            fill: #ccc;
            stroke: #fff;
            stroke-width: 2;
        }

        .guideline {
            stroke: rgba(255, 255, 255, 0.2);
            stroke-width: 2;
            stroke-dasharray: 8 6;
        }
    </style>
</head>

<body>

    <div class="ipad-container">
        <div class="header">
            <a href="../../index.html" class="back-link">← 返回目錄</a>
            <h1 class="modern-title">彈簧槍能量守恆</h1>
        </div>

        <div class="bento-card controls-panel">
            <h2>原理解釋</h2>
            <div class="explanation">
                當彈簧完全壓縮時，系統儲存了<strong>彈性勢能</strong>。釋放彈簧後，砲彈沿著槍管向上運動，彈性勢能轉換為砲彈的<strong>動能</strong>與<strong>重力勢能</strong>（因高度增加）。<br><br>
                根據能量守恆定律：
            </div>

            <div class="math-block">
                $$ E = \Delta E_k + \Delta E_p $$
            </div>

            <div id="physicsExplanation" class="math-block"
                style="text-align: left; font-size: 14px; line-height: 1.8;">
                <!-- Dynamically populated -->
            </div>

            <div style="flex-grow: 1;"></div>

            <button class="btn-play" id="playBtn" onclick="toggleSim()">發射砲彈</button>
            <button class="btn-reset" onclick="resetSim()">重置</button>
        </div>

        <div class="bento-card simulation-panel">
            <div class="speed-panel" id="speedPanel">
                <h4>速度分析</h4>
                <div class="speed-stats">
                    <div class="stat"><span class="label">水平分量 (Vx):</span> <span><span id="vxVal">0.00</span>
                            m/s</span></div>
                    <div class="stat"><span class="label">垂直分量 (Vy):</span> <span><span id="vyVal">0.00</span>
                            m/s</span></div>
                    <div class="stat"><span class="label">總合速度 (V):</span> <span><span id="vTotal">0.00</span>
                            m/s</span></div>
                </div>
            </div>

            <svg id="simCanvas" viewBox="0 0 1000 600">
                <!-- Background ground line -->
                <line x1="0" y1="520" x2="1000" y2="520" class="guideline" style="stroke-dasharray: none;" />
                <text x="500" y="540" fill="#888" font-size="14" text-anchor="middle">參考水平面</text>

                <g id="gunGroup" transform="translate(100, 500) scale(1, -1)">
                    <!-- Guidelines for height -->
                    <g id="heightGuidelines" scale="1, -1" style="display: none;">
                        <line id="lineH1" x1="-100" y1="0" x2="400" y2="0" class="guideline" />
                        <line id="lineH2" x1="-100" y1="200" x2="400" y2="200" class="guideline" />

                        <path d="M 380,0 L 380,200" stroke="#fff" stroke-width="2" marker-start="url(#arrow-start)"
                            marker-end="url(#arrow-end)" />
                        <text x="390" y="100" transform="scale(1, -1)" fill="#fff" font-size="16"
                            alignment-baseline="middle">0.2 m</text>
                    </g>

                    <!-- Gun Tube -->
                    <line x1="0" y1="-20" x2="250" y2="-20" class="tube-line" />
                    <line x1="0" y1="20" x2="250" y2="20" class="tube-line" />
                    <line x1="0" y1="-20" x2="0" y2="20" class="tube-line" />

                    <!-- Spring -->
                    <path id="springPath" class="spring" d="M 0,0" />

                </g>

                <!-- Projectile Path Trail (Global) -->
                <path id="projectileTrail" fill="none" stroke="var(--neon-blue)" stroke-width="2" stroke-dasharray="4 4"
                    opacity="0.6" />

                <defs>
                    <marker id="arrow-start" markerWidth="10" markerHeight="10" refX="10" refY="5"
                        orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="#fff" />
                    </marker>
                    <marker id="arrow-end" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="#fff" />
                    </marker>
                    <marker id="arrowVx" markerWidth="6" markerHeight="6" refX="0" refY="3" orient="auto"
                        markerUnits="strokeWidth">
                        <path d="M 0 0 L 6 3 L 0 6 Z" fill="#f43f5e" />
                    </marker>
                    <marker id="arrowVy" markerWidth="6" markerHeight="6" refX="0" refY="3" orient="auto"
                        markerUnits="strokeWidth">
                        <path d="M 0 0 L 6 3 L 0 6 Z" fill="#10b981" />
                    </marker>
                    <marker id="arrowV" markerWidth="6" markerHeight="6" refX="0" refY="3" orient="auto"
                        markerUnits="strokeWidth">
                        <path d="M 0 0 L 6 3 L 0 6 Z" fill="#00d2ff" />
                    </marker>
                </defs>

                <g id="vectorGroup" style="display: none;"></g>

                <!-- Contextual layer for annotations -->
                <g id="annotationLayer"></g>

                <!-- Projectile (Global) - Always on Top -->
                <circle id="projectile" cx="100" cy="500" r="16" class="projectile" />
            </svg>
        </div>
    </div>

    <script>
        // Configuration
        const TUBE_LENGTH = 250;
        const TUBE_ANGLE_DEG = 50; // Angle changed for DSE question (b)
        const TUBE_ANGLE_RAD = TUBE_ANGLE_DEG * Math.PI / 180;

        // Spring properties
        const SPRING_COILS = 7;
        const SPRING_RADIUS = 12;
        const SPRING_COMPRESSED_LEN = 80;
        const SPRING_NATURAL_LEN = 180;

        // Physics and Logic state
        let isPlaying = false;
        let animFrame = null;
        let t = 0; // time surrogate
        let phase = 0; // 0=ready, 1=spring, 2=projectile
        let projPhysicsTime = 0;
        let lastFrameTime = 0;
        const TIME_SCALE = 0.5; // Slow down factor

        // UI Elements
        const gunGroup = document.getElementById('gunGroup');
        const springPath = document.getElementById('springPath');
        const projectile = document.getElementById('projectile');
        const projectileTrail = document.getElementById('projectileTrail');
        const btnPlay = document.getElementById('playBtn');
        const annotationLayer = document.getElementById('annotationLayer');

        // Derived target position calculation for animation
        const START_X = SPRING_COMPRESSED_LEN + 16;
        const END_X = SPRING_NATURAL_LEN + 16;

        // Dynamic Scale Calculation based on SVG logic
        // 砲彈在槍管中移動了 (END_X - START_X) = 100px
        // 它的高度變化是 100 * sin(45) px
        // 這個高度變化在物理上對應 0.2 m
        const ACTUAL_HEIGHT_DIFF_PX = (END_X - START_X) * Math.sin(TUBE_ANGLE_RAD);
        const SCALE_PX_PER_M = ACTUAL_HEIGHT_DIFF_PX / 0.2;
        const V0_PX = 4 * SCALE_PX_PER_M; // 4 m/s * scale
        const G_PX = 9.81 * SCALE_PX_PER_M; // 9.81 m/s^2 * scale

        let trailCoordinates = [];

        function initCanvas() {
            // Set rotation for the gun (note: SVG g is flipped y (scale 1, -1), so rotate is CCW)
            gunGroup.setAttribute('transform', `translate(100, 500) scale(1, -1) rotate(${TUBE_ANGLE_DEG})`);
            resetSim();
        }

        function drawSpring(length) {
            let path = `M 0,0 L 10,0 `;
            const activeLength = length - 20; // reserve space for start/end lines
            const dx = activeLength / (SPRING_COILS * 2);

            let currX = 10;
            for (let i = 0; i < SPRING_COILS; i++) {
                path += `L ${currX + dx},${SPRING_RADIUS} `;
                currX += dx * 2;
                path += `L ${currX},${-SPRING_RADIUS} `;
            }
            path += `L ${length - 10},0 L ${length},0`;
            springPath.setAttribute('d', path);
        }

        function updateTrail(sx, sy) {
            trailCoordinates.push(`${sx},${sy}`);
            if (trailCoordinates.length > 0) {
                projectileTrail.setAttribute('d', `M ${trailCoordinates.join(' L ')}`);
            }
        }

        function clearTrail() {
            trailCoordinates = [];
            projectileTrail.setAttribute('d', '');
        }

        /**
         * 高品質 SVG 向量繪製函式 (符合 physics-viz-vectors 標準)
         */
        function drawSVGArrow(parent, id, x1, y1, x2, y2, color, label, isDouble = false, labelPos = 'end') {
            let group = document.getElementById(id + 'Group');
            if (!group) {
                group = document.createElementNS("http://www.w3.org/2000/svg", "g");
                group.id = id + 'Group';
                parent.appendChild(group);

                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.id = id + 'Line';
                line.setAttribute('stroke-width', '3');
                line.setAttribute('stroke-linecap', 'butt');
                group.appendChild(line);

                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.id = id + 'Text';
                text.setAttribute('font-family', "'Outfit', 'Inter', sans-serif");
                text.setAttribute('font-size', '16');
                text.setAttribute('font-weight', 'bold');
                group.appendChild(text);
            }

            const line = document.getElementById(id + 'Line');
            const text = document.getElementById(id + 'Text');

            const dx = x2 - x1;
            const dy = y2 - y1;
            const length = Math.sqrt(dx * dx + dy * dy);
            if (length < 0.1) {
                group.style.display = 'none';
                return;
            }
            group.style.display = 'block';

            const headlen = 20;
            const angle = Math.atan2(dy, dx);

            // 縮短箭身避免冒尖 (如果兩端都有箭頭則縮短兩端)
            const x1_line = isDouble ? x1 + headlen * 0.5 * Math.cos(angle) : x1;
            const y1_line = isDouble ? y1 + headlen * 0.5 * Math.sin(angle) : y1;
            const x2_line = x2 - headlen * 0.5 * Math.cos(angle);
            const y2_line = y2 - headlen * 0.5 * Math.sin(angle);

            line.setAttribute('x1', x1_line);
            line.setAttribute('y1', y1_line);
            line.setAttribute('x2', x2_line);
            line.setAttribute('y2', y2_line);
            line.setAttribute('stroke', color);
            if (color !== '#fff') line.style.filter = `drop-shadow(0 0 5px ${color})`;

            // 更新箭頭 Polygon
            function upsertPoly(pid, px, py, pangle) {
                let poly = document.getElementById(pid);
                if (!poly) {
                    poly = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
                    poly.id = pid;
                    group.appendChild(poly);
                }
                const pt1 = `${px},${py}`;
                const pt2 = `${px - headlen * Math.cos(pangle - Math.PI / 6)},${py - headlen * Math.sin(pangle - Math.PI / 6)}`;
                const pt3 = `${px - headlen * Math.cos(pangle + Math.PI / 6)},${py - headlen * Math.sin(pangle + Math.PI / 6)}`;
                poly.setAttribute('points', `${pt1} ${pt2} ${pt3}`);
                poly.setAttribute('fill', color);
                if (color !== '#fff') poly.style.filter = `drop-shadow(0 0 5px ${color})`;
            }

            upsertPoly(id + 'PolyEnd', x2, y2, angle);
            if (isDouble) {
                upsertPoly(id + 'PolyStart', x1, y1, angle + Math.PI);
            } else {
                const pStart = document.getElementById(id + 'PolyStart');
                if (pStart) pStart.remove();
            }

            // 標籤
            if (label) {
                text.textContent = label;
                let textX, textY, anchor;

                if (labelPos === 'middle') {
                    textX = (x1 + x2) / 2;
                    textY = (y1 + y2) / 2 - 15; // Offset above the line
                    anchor = 'middle';
                } else {
                    const offset = 25;
                    textX = x2 + offset * Math.cos(angle);
                    textY = y2 + offset * Math.sin(angle);

                    // Adjust anchor and vertical alignment for better readability
                    anchor = Math.cos(angle) > 0 ? 'start' : 'end';
                    if (Math.abs(Math.sin(angle)) > 0.8) anchor = 'middle';
                }

                text.setAttribute('x', textX);
                text.setAttribute('y', textY);
                text.setAttribute('fill', color);
                text.setAttribute('text-anchor', anchor);
                text.style.filter = `drop-shadow(0 0 4px rgba(0,0,0,0.5))`;
            } else {
                text.textContent = '';
            }
        }

        function drawAnnotations(projX, projY, showV) {
            annotationLayer.innerHTML = ''; // Clear for redrawing via function

            const startRy = 500 - START_X * Math.sin(TUBE_ANGLE_RAD);
            const endRy = 500 - END_X * Math.sin(TUBE_ANGLE_RAD);

            // Background guides (static lines)
            annotationLayer.innerHTML += `
                <line x1="0" y1="${startRy}" x2="1000" y2="${startRy}" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-dasharray="8 6" />
                <line x1="0" y1="${endRy}" x2="1000" y2="${endRy}" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-dasharray="8 6" />
            `;

            // Height indicator arrow
            drawSVGArrow(annotationLayer, 'heightIndicator', 60, startRy, 60, endRy, '#fff', '0.2 m', true);

            // Range indicator
            const rangeTime = (2 * 4 * Math.sin(TUBE_ANGLE_RAD)) / 9.81;
            const rangePx = (4 * Math.cos(TUBE_ANGLE_RAD) * rangeTime) * SCALE_PX_PER_M;
            const endRx = 100 + END_X * Math.cos(TUBE_ANGLE_RAD);
            const targetX = endRx + rangePx;

            drawSVGArrow(annotationLayer, 'rangeIndicator', endRx, endRy, targetX, endRy, '#39ff14', '射程 R', false, 'middle');

            if (showV) {
                const rx = 100 + projX * Math.cos(TUBE_ANGLE_RAD);
                const ry = 500 - projX * Math.sin(TUBE_ANGLE_RAD);
                const vLen = 60;
                const vx_head = rx + vLen * Math.cos(TUBE_ANGLE_RAD);
                const vy_head = ry - vLen * Math.sin(TUBE_ANGLE_RAD);
                drawSVGArrow(annotationLayer, 'muzzleV', rx, ry, vx_head, vy_head, '#00d2ff', 'v = 4.0 m/s');
            }
        }

        function toggleSim() {
            if (isPlaying) return;

            if (phase === 0) {
                phase = 1;
                lastFrameTime = performance.now();
                isPlaying = true;
                btnPlay.disabled = true;
                btnPlay.style.opacity = '0.5';
                t = 0;
                animFrame = requestAnimationFrame(animate);
            } else if (phase === 2 || phase === 3) {
                lastFrameTime = performance.now();
                isPlaying = true;
                btnPlay.disabled = true;
                btnPlay.style.opacity = '0.5';
                animFrame = requestAnimationFrame(animate);
            } else if (phase === 4) {
                resetSim();
            }
        }

        function resetSim() {
            cancelAnimationFrame(animFrame);
            isPlaying = false;
            phase = 0;
            t = 0;
            projPhysicsTime = 0;
            lastFrameTime = 0;
            btnPlay.disabled = false;
            btnPlay.style.opacity = '1';
            btnPlay.innerHTML = '發射砲彈';

            document.getElementById('speedPanel').style.display = 'none';
            document.getElementById('vectorGroup').style.display = 'none';

            const explanationPanel = document.getElementById('physicsExplanation');
            explanationPanel.innerHTML = '';
            explanationPanel.style.display = 'none';
            try {
                if (window.renderMathInElement) renderMathInElement(explanationPanel, { delimiters: [{ left: '$$', right: '$$', display: true }, { left: '$', right: '$', display: false }] });
            } catch (e) { }

            document.getElementById('speedPanel').style.display = 'none';
            document.getElementById('vectorGroup').style.display = 'none';

            // Show energy conservation UI again
            const energyBlock = document.querySelector('.math-block');
            if (energyBlock) energyBlock.style.display = 'block';
            const energyExplanation = document.querySelector('.explanation');
            if (energyExplanation) energyExplanation.style.display = 'block';

            drawSpring(SPRING_COMPRESSED_LEN);

            // Initial muzzle acceleration start point in global coordinates
            const sx = 100 + START_X * Math.cos(TUBE_ANGLE_RAD);
            const sy = 500 - START_X * Math.sin(TUBE_ANGLE_RAD);
            projectile.setAttribute('cx', sx);
            projectile.setAttribute('cy', sy);
            clearTrail();

            drawAnnotations(START_X, 0, false);
        }

        function animate(timestamp) {
            const currentFrameTime = timestamp;
            if (!lastFrameTime) lastFrameTime = currentFrameTime;
            const deltaDt = (currentFrameTime - lastFrameTime) / 1000;
            lastFrameTime = currentFrameTime;

            // Ensure projectile stays on top by moving it to the end of the SVG
            const projectile = document.getElementById('projectile');
            if (projectile && projectile.parentNode) {
                projectile.parentNode.appendChild(projectile);
            }

            if (phase === 1) {
                t += 0.03 * TIME_SCALE; // slowed down acceleration
                if (t >= 1) t = 1;

                // Easing function (sine) to simulate spring pushing
                const progress = Math.sin(t * Math.PI / 2);

                const currentSpringLen = SPRING_COMPRESSED_LEN + (SPRING_NATURAL_LEN - SPRING_COMPRESSED_LEN) * progress;
                const currentProjX = START_X + (END_X - START_X) * progress;

                drawSpring(currentSpringLen);

                // Acceleration in gun (global coords)
                const sx = 100 + currentProjX * Math.cos(TUBE_ANGLE_RAD);
                const sy = 500 - currentProjX * Math.sin(TUBE_ANGLE_RAD);
                projectile.setAttribute('cx', sx);
                projectile.setAttribute('cy', sy);

                drawAnnotations(currentProjX, 0, t >= 1);

                if (t < 1) {
                    animFrame = requestAnimationFrame(animate);
                } else {
                    phase = 2; // Transition to projectile motion
                    projPhysicsTime = 0;
                    isPlaying = false;

                    btnPlay.disabled = false;
                    btnPlay.style.opacity = '1';
                    btnPlay.innerHTML = '繼續 (斜向拋射)';

                    const explanationPanel = document.getElementById('physicsExplanation');
                    explanationPanel.style.display = 'block';
                    explanationPanel.innerHTML = `
                    <div style="color: #00d2ff; font-weight: bold; margin-bottom: 5px;">🚀 離開槍管處</div>
                    初速 $v = 4.0 \\text{ m/s}$<br>
                    仰角 $\\theta = 50^\\circ$<br>
                    <div style="color: #fbbf24; font-weight: bold; margin: 10px 0 5px 0;">🔥 拋射計算</div>
                    飛行時間：$s_y = u_{y}t_f + \\frac{1}{2}gt_f^2$ <br>
                    水平射程：$R = u_{x}t_f$
                `;
                    if (window.renderMathInElement) renderMathInElement(explanationPanel, { delimiters: [{ left: '$$', right: '$$', display: true }, { left: '$', right: '$', display: false }] });

                    drawAnnotations(currentProjX, 0, true);

                    // Hide all energy conservation related UI
                    const energyBlock = document.querySelector('.math-block');
                    if (energyBlock) energyBlock.style.display = 'none';
                    const energyExplanation = document.querySelector('.explanation');
                    if (energyExplanation) energyExplanation.style.display = 'none';

                    // Show speed panel and populate initial velocities
                    const spdPanel = document.getElementById('speedPanel');
                    spdPanel.style.display = 'flex';
                    const spdStats = document.querySelector('.speed-stats');
                    if (spdStats) spdStats.style.visibility = 'visible';

                    const v0 = 4.0;
                    const vx_ms = v0 * Math.cos(TUBE_ANGLE_RAD);
                    const vy_ms = v0 * Math.sin(TUBE_ANGLE_RAD);
                    document.getElementById('vxVal').innerText = vx_ms.toFixed(2);
                    document.getElementById('vyVal').innerText = vy_ms.toFixed(2);
                    document.getElementById('vTotal').innerText = v0.toFixed(2);

                    // Hide component vectors at pause, only show the blue muzzle arrow (via drawAnnotations)
                    document.getElementById('vectorGroup').style.display = 'none';

                    return;
                }
            } else if (phase === 2 || phase === 3) {
                projPhysicsTime += deltaDt * TIME_SCALE;

                const v0 = 4.0;
                const g = 9.81;
                const rangeTime = (2 * v0 * Math.sin(TUBE_ANGLE_RAD)) / g;

                let reachedR = false;
                if (phase === 2 && projPhysicsTime >= rangeTime) {
                    projPhysicsTime = rangeTime;
                    reachedR = true;
                    phase = 3;
                }

                const dt = projPhysicsTime;

                // Launch point (muzzle) in screen coordinates
                const launchX = 100 + END_X * Math.cos(TUBE_ANGLE_RAD);
                const launchY = 500 - END_X * Math.sin(TUBE_ANGLE_RAD);

                // Projectile position in screen coordinates
                const dx_m = v0 * Math.cos(TUBE_ANGLE_RAD) * dt;
                const dy_m = v0 * Math.sin(TUBE_ANGLE_RAD) * dt - 0.5 * g * dt * dt;

                const sx = launchX + dx_m * SCALE_PX_PER_M;
                const sy = launchY - dy_m * SCALE_PX_PER_M;

                projectile.setAttribute('cx', sx);
                projectile.setAttribute('cy', sy);
                updateTrail(sx, sy);

                // Velocities in m/s
                const vx_ms = v0 * Math.cos(TUBE_ANGLE_RAD);
                const vy_ms = v0 * Math.sin(TUBE_ANGLE_RAD) - g * dt;
                const vTotal_ms = Math.hypot(vx_ms, vy_ms);

                const spdPanel = document.getElementById('speedPanel');
                if (spdPanel.style.display !== 'flex') {
                    spdPanel.style.display = 'flex';
                }
                const spdStats = document.querySelector('.speed-stats');
                if (spdStats) spdStats.style.visibility = 'visible';
                document.getElementById('vectorGroup').style.display = 'block';

                document.getElementById('vxVal').innerText = vx_ms.toFixed(2);
                document.getElementById('vyVal').innerText = vy_ms.toFixed(2);
                document.getElementById('vTotal').innerText = vTotal_ms.toFixed(2);

                const vScale = 40;
                const vectorGrp = document.getElementById('vectorGroup');
                drawSVGArrow(vectorGrp, 'vx', sx, sy, sx + vx_ms * vScale, sy, '#f43f5e', 'vx');
                drawSVGArrow(vectorGrp, 'vy', sx, sy, sx, sy - vy_ms * vScale, '#10b981', 'vy');
                drawSVGArrow(vectorGrp, 'v', sx, sy, sx + vx_ms * vScale, sy - vy_ms * vScale, '#00d2ff', 'v');

                // Hide the muzzle velocity arrow during dynamic phase
                drawAnnotations(END_X, 0, false);

                if (reachedR) {
                    isPlaying = false;
                    btnPlay.disabled = false;
                    btnPlay.style.opacity = '1';
                    btnPlay.innerHTML = '繼續 (到底)';
                    return;
                }

                // Stop when it drops below the ground reference line (approx 520 bounds -> stop around 540)
                if (sy < 540 && sx < 1000) {
                    animFrame = requestAnimationFrame(animate);
                } else {
                    isPlaying = false;
                    phase = 4;
                    btnPlay.disabled = false;
                    btnPlay.style.opacity = '1';
                    btnPlay.innerHTML = '重新歸位';
                }
            }
        }

        try {
            initCanvas();
        } catch (e) {
            console.error("Initialization error:", e);
        }
    </script>

</body>
