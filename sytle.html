<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <title>Physics Simulation - Aurora Bento</title>
    <style>
        :root {
            /* 核心變數設定 */
            --bg-color: #050505;
            --card-bg: rgba(15, 23, 42, 0.25);
            --card-border: 1px solid rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --canvas-bg: #000;

            /* 三種漸層主色：青、靛紫、桃粉 */
            --color-1: #38bdf8;
            --color-2: #818cf8;
            --color-3: #e879f9;

            --border-radius: 24px;
            --box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            --font-family: system-ui, -apple-system, sans-serif;
            --backdrop: blur(24px);
        }

        body {
            margin: 0;
            padding: 24px;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            height: 100vh;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        /* 底層動態環境光暈 */
        body::before,
        body::after {
            content: '';
            position: absolute;
            width: 60vw;
            height: 60vh;
            border-radius: 50%;
            z-index: -1;
            filter: blur(120px);
            animation: float 20s infinite alternate ease-in-out;
        }

        body::before {
            background: linear-gradient(135deg, var(--color-1), var(--color-2));
            top: -15%;
            left: -10%;
            opacity: 0.4;
        }

        body::after {
            background: linear-gradient(135deg, var(--color-2), var(--color-3));
            bottom: -15%;
            right: -10%;
            opacity: 0.3;
            animation-delay: -10s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(15vw, 10vh) scale(1.3);
            }
        }

        /* 佈局容器 */
        .bento-container {
            display: grid;
            grid-template-columns: 3fr 1fr;
            grid-template-rows: auto 1fr;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            height: 90vh;
            position: relative;
        }

        /* 共用面板樣式 */
        .panel {
            background: var(--card-bg);
            border: var(--card-border);
            border-radius: var(--border-radius);
            padding: 24px;
            box-shadow: var(--box-shadow);
            backdrop-filter: var(--backdrop);
            -webkit-backdrop-filter: var(--backdrop);
            display: flex;
            flex-direction: column;
        }

        /* 物理畫面區 */
        .canvas-area {
            grid-column: 1 / 2;
            grid-row: 1 / 3;
        }

        canvas {
            width: 100%;
            flex-grow: 1;
            background: var(--canvas-bg);
            border: var(--card-border);
            border-radius: calc(var(--border-radius) / 2);
            margin-top: 16px;
        }

        /* 標題與狀態區 */
        .status-area {
            grid-column: 2 / 3;
            grid-row: 1 / 2;
        }

        /* 數據顯示：文字漸層 */
        .data-display {
            font-family: ui-monospace, 'Courier New', monospace;
            font-size: 28px;
            font-weight: bold;
            margin-top: 8px;
            background: linear-gradient(90deg, var(--color-1), var(--color-3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 控制面板區 */
        .controls-area {
            grid-column: 2 / 3;
            grid-row: 2 / 3;
            gap: 24px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        label {
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        label span {
            color: var(--text-main);
            font-family: ui-monospace, 'Courier New', monospace;
        }

        /* 滑桿美化 */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--text-main);
            cursor: pointer;
            box-shadow: -4px 0 15px var(--color-1), 4px 0 15px var(--color-3);
            transition: transform 0.1s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        h2 {
            margin: 0;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            opacity: 0.8;
            border-bottom: var(--card-border);
            padding-bottom: 8px;
        }
    </style>
</head>

<body>

    <div class="bento-container">
        <div class="panel canvas-area">
            <h2>Simulation View</h2>
            <canvas id="physicsCanvas"></canvas>
        </div>

        <div class="panel status-area">
            <h2>Live Data</h2>
            <div class="data-display" id="velocity-display">V = 24.5 m/s</div>
        </div>

        <div class="panel controls-area">
            <h2>Parameters</h2>

            <div class="control-group">
                <label>Gravity <span id="val-gravity">9.8</span></label>
                <input type="range" min="0" max="20" step="0.1" value="9.8"
                    oninput="document.getElementById('val-gravity').innerText = this.value">
            </div>

            <div class="control-group">
                <label>Mass <span id="val-mass">50 kg</span></label>
                <input type="range" min="1" max="100" value="50"
                    oninput="document.getElementById('val-mass').innerText = this.value + ' kg'">
            </div>

            <div class="control-group">
                <label>Friction <span id="val-friction">0.2</span></label>
                <input type="range" min="0" max="1" step="0.05" value="0.2"
                    oninput="document.getElementById('val-friction').innerText = this.value">
            </div>
        </div>
    </div>

</body>

</html>
