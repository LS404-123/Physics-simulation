<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物理模擬實驗室 | Physics Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #f1f5f9;
            /* Slate 100 - Main Background */
            --accent-primary: #0ea5e9;
            --accent-secondary: #6366f1;
            --accent-tertiary: #d946ef;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(0, 0, 0, 0.06);
            --text-main: #0f172a;
            --text-dim: #64748b;
            --card-radius: 20px;
            --sidebar-width: 260px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.01);
            --sidebar-bg: #ffffff;
            --search-bg: #e2e8f0;
            /* Slate 200 */
        }

        * {
            box-sizing: border-box;
            outline: none;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', 'Inter', "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient Background */
        body::before {
            content: '';
            position: fixed;
            width: 100vw;
            height: 100vh;
            background:
                radial-gradient(at 0% 0%, rgba(14, 165, 233, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(217, 70, 239, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.05) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(56, 189, 248, 0.05) 0px, transparent 50%);
            z-index: -1;
        }

        /* Main Container - Responsive Webpage Style */
        .app-container {
            width: 100%;
            max-width: 1440px;
            min-height: 100vh;
            display: flex;
            background: transparent;
            position: relative;
        }

        /* Sidebar Navigation - Sticky */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            position: sticky;
            top: 0;
            border-right: 1px solid var(--glass-border);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: var(--sidebar-bg);
            z-index: 10;
        }

        .brand {
            margin-bottom: 40px;
            padding: 0 10px;
        }

        .brand h1 {
            font-size: 24px;
            font-weight: 600;
            margin: 0;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            /* 標準屬性 */
            -webkit-text-fill-color: transparent;
        }

        .nav-item {
            padding: 12px 18px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 15px;
            color: var(--text-dim);
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid transparent;
        }

        .nav-item:hover {
            color: var(--text-main);
            background: rgba(0, 0, 0, 0.03);
        }

        .nav-item.active {
            color: var(--accent-primary);
            background: white;
            border-color: var(--glass-border);
            box-shadow: var(--shadow);
            font-weight: 600;
        }

        .sidebar a:hover {
            color: var(--accent-primary) !important;
            text-shadow: 0 0 10px rgba(14, 165, 233, 0.2);
        }

        .sidebar-footer {
            padding: 20px 18px;
            border-top: 1px solid var(--glass-border);
            font-size: 11px;
            color: var(--text-dim);
            display: flex;
            flex-direction: column;
            gap: 8px;
            line-height: 1.4;
        }

        .sidebar-footer .footer-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-footer .github-link {
            font-weight: 600;
            color: var(--text-dim);
            text-decoration: none;
            transition: var(--transition);
        }

        /* Sidebar Sub-items */
        .sidebar-sub-list {
            margin-left: 30px;
            margin-top: -5px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }

        .nav-item.active+.sidebar-sub-list {
            max-height: 500px;
            margin-top: 5px;
        }

        .sub-nav-item {
            font-size: 13px;
            color: var(--text-dim);
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sub-nav-item:hover {
            color: var(--accent-primary);
            background: rgba(14, 165, 233, 0.05);
        }

        /* Sidebar Sections */
        .sidebar-section {
            margin-bottom: 24px;
        }

        .sidebar-section-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 0 18px 10px;
            opacity: 0.8;
        }

        /* Main Content Area */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 40px 60px;
            background: transparent;
        }

        /* Top Bar & Search */
        .top-bar {
            margin-bottom: 40px;
            display: flex;
            gap: 24px;
            align-items: center;
            position: sticky;
            top: 40px;
            z-index: 5;
        }

        .search-container {
            flex: 1;
            position: relative;
        }

        #search-input {
            width: 100%;
            background: var(--search-bg);
            border: 1px solid transparent;
            border-radius: 20px;
            padding: 18px 20px 18px 55px;
            color: var(--text-main);
            font-size: 16px;
            transition: var(--transition);
        }

        #search-input:focus {
            background: white;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-size: 20px;
        }

        /* Simulation Grid (Bento) */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            grid-auto-rows: min-content;
            gap: 30px;
            padding-bottom: 60px;
        }

        .sim-card {
            background: var(--glass-bg);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid var(--glass-border);
            border-radius: var(--card-radius);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: var(--transition);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.5s ease backwards;
            min-height: 320px;
            box-shadow: var(--shadow);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .sim-card:hover {
            background: white;
            border-color: var(--accent-primary);
            transform: translateY(-8px);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.1);
        }

        .sim-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            opacity: 0;
            transition: var(--transition);
        }

        .sim-card:hover::after {
            opacity: 1;
        }

        .sim-image {
            width: 100%;
            height: 160px;
            border-radius: 14px;
            background: #f1f5f9;
            overflow: hidden;
            position: relative;
        }

        .sim-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }

        .sim-card:hover .sim-image img {
            transform: scale(1.08);
        }

        .sim-info h3 {
            margin: 0;
            font-size: 19px;
            font-weight: 600;
            color: var(--text-main);
        }

        .sim-info p {
            margin: 10px 0 0;
            font-size: 14px;
            color: var(--text-dim);
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            /* 標準屬性 */
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-footer {
            margin-top: auto;
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        .enter-btn {
            background: #f1f5f9;
            color: var(--text-main);
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            transition: var(--transition);
        }

        .sim-card:hover .enter-btn {
            background: var(--accent-primary);
            color: white;
        }

        /* Subtopic Header */
        .subtopic-header {
            grid-column: 1 / -1;
            padding: 14px 20px;
            margin-top: 25px;
            background: rgba(0, 0, 0, 0.03);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            border-left: 4px solid var(--accent-primary);
        }

        .subtopic-header span {
            color: var(--text-dim);
            font-weight: 400;
            font-size: 14px;
            margin-left: auto;
        }

        /* Empty State */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 120px 0;
            color: var(--text-dim);
        }

        .empty-state i {
            font-size: 50px;
            margin-bottom: 24px;
            display: block;
            opacity: 0.5;
        }

        /* Status Indicators */
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 8px rgba(16, 185, 129, 0.4);
        }
    </style>
</head>

<body>

    <div class="app-container">
        <!-- Sidebar Navigation -->
        <div class="sidebar">
            <div class="brand">

    <script>

        function renderSidebar() {
            let html = '';

            // Section 1: Overview

                html += `<div class="sidebar-section"><div class="sidebar-section-title">進階挑戰</div>`;
                advancedCats.forEach(cat => html += generateNavItem(cat));
                html += `</div>`;
            }

            // Section 4: Game
            const gameCats = libraryData.filter(cat => cat.category.includes('遊戲'));
            if (gameCats.length > 0) {
                html += `<div class="sidebar-section"><div class="sidebar-section-title">互動遊戲</div>`;
                gameCats.forEach(cat => html += generateNavItem(cat));
                html += `</div>`;
            }

            sidebarNav.innerHTML = html;

            document.querySelectorAll('.sidebar .nav-item').forEach(nav => {
                nav.onclick = () => {
                    currentCategory = nav.getAttribute('data-category');
                    renderSidebar();
                    renderLibrary();
                };
            });
        }

        function generateNavItem(cat) {
            const isActive = cat.category === currentCategory;
            const icon = cat.category.includes('第') ? '📘' : (cat.category.includes('困難') ? '🏆' : '🎮');
            return `
                <div class="nav-item ${isActive ? 'active' : ''}" data-category="${cat.category}">
                    <span>${icon} ${cat.category}</span>
                </div>
                <div class="sidebar-sub-list" style="max-height: ${isActive ? '500px' : '0'}">
                    ${cat.subtopics.map(sub => `
                        <div class="sub-nav-item" onclick="event.stopPropagation(); jumpToSubtopic('${cat.category}', '${sub.name}')">
                            • ${sub.name}
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function jumpToSubtopic(cat, subName) {
            currentCategory = cat;
            renderSidebar();
            renderLibrary();

            setTimeout(() => {
                const headers = document.querySelectorAll('.subtopic-header');
                for (let header of headers) {
                    if (header.textContent.includes(subName)) {
                        header.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        header.style.color = 'var(--accent-tertiary)';
                        setTimeout(() => header.style.color = '', 2000);
                        break;
                    }
                }
            }, 100);
        }

        function renderLibrary() {
            simGrid.innerHTML = '';
            let html = '';
            let totalMatch = 0;

            libraryData.forEach(cat => {
                if (currentCategory === 'all' || cat.category === currentCategory) {
                    cat.subtopics.forEach(sub => {
                        const filteredItems = sub.items.filter(item => {
                            if (!searchQuery) return true;
                            return item.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
                                item.desc.toLowerCase().includes(searchQuery.toLowerCase());
                        });

                        if (filteredItems.length > 0) {
                            totalMatch += filteredItems.length;
                            html += `<div class="subtopic-header">
                                ${sub.name} <span>(${filteredItems.length})</span>
                            </div>`;

                            filteredItems.forEach((item, idx) => {
                                const imgUrl = item.image || DEFAULT_IMAGE;
                                html += `
                                    <div class="sim-card" onclick="window.location.href='${item.link}'" style="animation-delay: ${idx * 30}ms">
                                        <div class="sim-image">
                                            <img src="${imgUrl}" alt="${item.title}" onerror="this.src='${DEFAULT_IMAGE}'">
                                        </div>
                                        <div class="sim-info">
                                            <h3>${item.title}</h3>
                                            <p>${item.desc || '配合教科書內容的互動式演示。'}</p>
                                        </div>
                                        <div class="card-footer">
                                            <span class="enter-btn">選取實驗</span>
                                        </div>
                                    </div>
                                `;
                            });
                        }
                    });
                }
            });

            if (totalMatch === 0) {
                simGrid.innerHTML = `
                    <div class="empty-state">
                        <i>🔭</i>
                        <p>找不到符合 "${searchQuery}" 的模擬實驗</p>
                    </div>
                `;
            } else {
                simGrid.innerHTML = html;
            }
        }

        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderLibrary();
        });

        document.addEventListener('DOMContentLoaded', () => {
            renderSidebar();
            renderLibrary();
        });
    </script>
</body>

</html>
